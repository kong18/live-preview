<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmong Live Preview Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --surface-primary: #f3d8e6;
        --action-lead: #8a0a0a;
        --action-glow: rgba(138, 10, 10, 0.4);
        --surface-white: #ffffff;
        --text-neutral: #1a1a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--surface-primary);
        background-image: radial-gradient(
          rgba(138, 10, 10, 0.08) 2px,
          transparent 2px
        );
        background-size: 30px 30px;
        color: var(--text-neutral);
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        transition: background-color 0.5s ease;
      }

      /* --- FULLSCREEN THEME OVERRIDES --- */
      body.fullscreen-mode {
        background-color: #000000;
        background-image: none;
      }

      /* --- 🌀 KINETIC TYPOGRAPHY --- */
      .ambient-container {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 12vw;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
        user-select: none;
      }
      .ambient-left {
        left: 0;
      }
      .ambient-right {
        right: 0;
      }

      .ambient-track {
        display: flex;
        flex-direction: column;
        gap: 20px;
        font-size: 15vw;
        font-weight: 900;
        color: rgba(138, 10, 10, 0.04);
        writing-mode: vertical-rl;
        text-orientation: mixed;
        height: 200vh;
      }

      .ambient-left .ambient-track {
        transform: rotate(180deg);
        animation: scrollMarquee 40s linear infinite;
      }
      .ambient-right .ambient-track {
        animation: scrollMarqueeRight 40s linear infinite;
      }

      @keyframes scrollMarquee {
        0% {
          transform: translateY(0) rotate(180deg);
        }
        100% {
          transform: translateY(50%) rotate(180deg);
        }
      }
      @keyframes scrollMarqueeRight {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50%);
        }
      }

      /* --- ✨ UPGRADED FILMONG BRANDING --- */
      .brand-header {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 10px 25px 10px 30px;
        border-radius: 100px;
        box-shadow:
          0 15px 35px rgba(138, 10, 10, 0.08),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        z-index: 100;
        pointer-events: none;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .fullscreen-mode .brand-header {
        opacity: 0;
        transform: translate(-50%, -150%);
      }

      .logo-main {
        font-weight: 900;
        font-size: 28px;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #8a0a0a 0%, #e94560 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0px 2px 4px rgba(138, 10, 10, 0.2));
        line-height: 1;
      }

      .logo-sub {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--action-lead);
        text-transform: uppercase;
        background: rgba(138, 10, 10, 0.06);
        padding: 6px 14px;
        border-radius: 50px;
      }

      .brand-live-dot {
        width: 8px;
        height: 8px;
        background: #ff3b30;
        border-radius: 50%;
        box-shadow: 0 0 10px #ff3b30;
        animation: pulseBrand 1.5s infinite;
      }
      @keyframes pulseBrand {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* --- 📊 Performance Monitor --- */
      .perf-monitor {
        position: fixed;
        top: 25px;
        right: 25px;
        background: rgba(0, 0, 0, 0.75);
        color: #00ff00;
        font-family: "Courier New", monospace;
        font-size: 11px;
        font-weight: bold;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(0, 255, 0, 0.3);
        z-index: 150;
        backdrop-filter: blur(5px);
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .perf-monitor.hidden {
        opacity: 0;
        transform: translateY(-10px);
      }
      .perf-monitor span {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }

      /* --- 📽️ Main Spatial Layout & BREATHING GLOW --- */
      .app-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 40px 100px 40px;
        width: 100%;
        z-index: 10;
        transition: padding 0.5s ease;
      }

      .fullscreen-mode .app-container {
        padding: 0;
      }

      .preview-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1400px;
        aspect-ratio: 16/9;
        border-radius: 24px;
        border: 8px solid var(--surface-white);
        background: #000;
        animation: studioBreathing 4s ease-in-out infinite;
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .video-container-inner {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        overflow: hidden;
        transition: all 0.5s ease;
      }

      /* FULLSCREEN LAYOUT OVERRIDES */
      .fullscreen-mode .preview-wrapper {
        border: none;
        border-radius: 0;
        max-width: 100%;
        height: 100vh;
        background: #000000;
        box-shadow: none;
        padding: 0;
        animation: none;
      }

      .fullscreen-mode .video-container-inner {
        border: none;
        border-radius: 0;
        background: transparent;
      }

      @keyframes studioBreathing {
        0%,
        100% {
          box-shadow:
            0 20px 50px rgba(138, 10, 10, 0.1),
            inset 0 0 0 1px rgba(0, 0, 0, 0.2),
            0 0 0px var(--action-glow);
        }
        50% {
          box-shadow:
            0 30px 60px rgba(138, 10, 10, 0.2),
            inset 0 0 0 1px rgba(0, 0, 0, 0.2),
            0 0 40px var(--action-glow);
        }
      }

      #preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(var(--rec-brightness, 1));
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #preview.flipped {
        transform: scaleX(-1);
      }
      #preview.flipped-v {
        transform: scaleY(-1);
      }
      #preview.flipped.flipped-v {
        transform: scaleX(-1) scaleY(-1);
      }

      /* 🎨 Canvas WebGL hiển thị kết quả màu (đè lên video, dưới overlay) */
      #glPreview {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1; /* trên video (in-flow), dưới lưới(5)/REC(10)/player(20) */
        display: none; /* chỉ hiện khi pipeline WebGL hoạt động */
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #glPreview.active {
        display: block;
      }
      #glPreview.flipped {
        transform: scaleX(-1);
      }
      #glPreview.flipped-v {
        transform: scaleY(-1);
      }
      #glPreview.flipped.flipped-v {
        transform: scaleX(-1) scaleY(-1);
      }

      /* --- 🎛️ SIMPLE PLAYER UI --- */
      .simple-player-ui {
        display: none;
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 60px 2.5% 25px 2.5%; /* Creates the 95% width feel with cinematic dark gradient */
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        z-index: 20;
        font-family: "Montserrat", sans-serif;
      }

      .fullscreen-mode .simple-player-ui {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .player-text-row {
        display: flex;
        justify-content: space-between;
        color: #ffffff;
        font-family: "VT323", monospace;
        font-size: 1.625rem;
        font-weight: 500;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        padding: 0 2px;
      }

      .player-title {
        opacity: 0.95;
      }

      .player-time {
        opacity: 0.95;
        font-variant-numeric: tabular-nums;
      }

      /* CSS Animated Time */
      @property --sec {
        syntax: "<integer>";
        initial-value: 0;
        inherits: false;
      }
      .player-time::before {
        content: "00:00 / 00:30";
      }
      .preview-wrapper:has(#recIndicatorUI.recording) .player-time::before {
        content: "00:" counter(sec, decimal-leading-zero) " / 00:30";
        animation: countUp 30s linear forwards;
        counter-reset: sec var(--sec);
      }
      @keyframes countUp {
        from {
          --sec: 0;
        }
        to {
          --sec: 30;
        }
      }

      .player-timeline-bg {
        width: 100%;
        height: 5px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        overflow: hidden;
      }

      .player-timeline-fill {
        height: 100%;
        width: 0%;
        background: #ffffff;
        border-radius: 4px;
        transition: background 0.3s ease;
      }

      /* Highlight the track with recording red when active */
      .preview-wrapper:has(#recIndicatorUI.recording) .player-timeline-fill {
        background: #ff3b30;
        animation: simpleTimerFill 30s linear forwards;
      }

      @keyframes simpleTimerFill {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }

      /* --- 🎛️ In-Screen Overlays --- */
      .cam-ui {
        position: absolute;
        top: 24px;
        width: 100%;
        padding: 0 24px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-family: "VT323", monospace;
        font-size: 26px;
        z-index: 10;
      }

      .rec-indicator {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(10, 5, 5, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 8px 20px;
        border-radius: 50px;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
      }

      .rec-indicator::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 2px;
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        background-size: 200% 100%;
        pointer-events: none;
        transition: all 0.5s ease;
      }

      .rec-indicator.previewing {
        color: #ffffff;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.5),
          0 0 0px rgba(52, 199, 89, 0);
        animation: breathingGreenPanel 4s ease-in-out infinite;
      }
      .rec-indicator.previewing::after {
        background: linear-gradient(
          90deg,
          transparent,
          #34c759,
          transparent,
          #34c759,
          transparent
        );
        background-size: 200% 100%;
        animation: borderSweep 3.5s linear infinite;
      }

      .rec-indicator.recording {
        color: #ff3b30;
        background: rgba(15, 0, 0, 0.9);
        box-shadow:
          0 8px 30px rgba(0, 0, 0, 0.7),
          0 0 25px rgba(255, 45, 85, 0.5);
        animation: breathingRedPanel 2s ease-in-out infinite;
      }
      .rec-indicator.recording::after {
        background: linear-gradient(
          90deg,
          #ff2d55,
          #ff3b30,
          #ff9500,
          #ff2d55,
          #ff3b30
        );
        background-size: 200% 100%;
        animation: borderSweep 1.8s linear infinite;
      }

      @keyframes borderSweep {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: 0 0;
        }
      }

      @keyframes breathingGreenPanel {
        0%,
        100% {
          box-shadow:
            0 8px 20px rgba(0, 0, 0, 0.5),
            0 0 4px rgba(52, 199, 89, 0.1);
        }
        50% {
          box-shadow:
            0 8px 25px rgba(0, 0, 0, 0.6),
            0 0 12px rgba(52, 199, 89, 0.35);
        }
      }

      @keyframes breathingRedPanel {
        0%,
        100% {
          box-shadow:
            0 8px 25px rgba(0, 0, 0, 0.6),
            0 0 10px rgba(255, 45, 85, 0.3);
          background: rgba(15, 0, 0, 0.9);
        }
        50% {
          box-shadow:
            0 8px 35px rgba(0, 0, 0, 0.8),
            0 0 25px rgba(255, 45, 85, 0.65);
          background: rgba(25, 0, 0, 0.95);
        }
      }

      .rec-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        transition: all 0.5s ease;
      }

      .rec-indicator.previewing .rec-dot {
        background: #34c759;
        box-shadow: 0 0 12px #34c759;
        animation: none;
      }

      .rec-indicator.recording .rec-dot {
        background: #ff3b30;
        animation: heartbeatGlow 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
      }

      @keyframes heartbeatGlow {
        0% {
          transform: scale(1);
          box-shadow: 0 0 8px #ff3b30;
          opacity: 0.8;
        }
        50% {
          transform: scale(1.35);
          box-shadow:
            0 0 22px #ff2d55,
            0 0 35px #ff3b30;
          opacity: 1;
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 8px #ff3b30;
          opacity: 0.8;
        }
      }

      #liveClock {
        position: relative;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 8px 20px;
        border-radius: 50px;
        color: #ffffff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      #liveClock::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent
        );
        background-size: 200% 100%;
        animation: borderSweep 4.5s linear infinite;
        pointer-events: none;
      }

      .composition-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        z-index: 5;
      }
      .composition-grid div {
        border: 1px dashed rgba(255, 255, 255, 0);
        transition: border-color 0.6s ease;
      }
      .composition-grid.visible div {
        border-color: rgba(255, 255, 255, 0.4);
      }

      /* --- 🛠️ Toolbar --- */
      .toolbar {
        position: fixed;
        bottom: 30px; /* Essential to stay inside the 100px JS mousemove trigger zone */
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        border-radius: 100px;
        border: 1px solid rgba(138, 10, 10, 0.1);
        box-shadow: 0 15px 35px rgba(138, 10, 10, 0.15);
        z-index: 100;
        transition:
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.4s ease;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .fullscreen-mode .toolbar {
        transform: translate(-50%, 150%);
        opacity: 0;
      }
      .fullscreen-mode .toolbar.show-toolbar {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      button,
      select {
        position: relative;
        overflow: hidden;
        background: var(--action-lead);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }

      button::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.4) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-20deg);
        transition: 0.6s ease;
      }
      button:hover::after {
        left: 150%;
      }
      button:hover:not(:disabled) {
        box-shadow: 0 8px 20px rgba(138, 10, 10, 0.3);
        transform: translateY(-2px);
      }
      button:active:not(:disabled) {
        transform: translateY(1px) scale(0.95);
        filter: brightness(0.9);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.active {
        background: white;
        color: var(--action-lead);
        box-shadow: 0 0 0 2px var(--action-lead) inset;
      }

      /* Ẩn nút có điều kiện: nút Ghi Hình (mở khóa bằng 6 lần bấm)
         và nút bật/tắt LUT (ẩn cho tới khi nạp file .cube) */
      #btnRecord.rec-hidden,
      #btnLutLoad.rec-hidden,
      #btnLutToggle.rec-hidden,
      #brightnessControl.rec-hidden {
        display: none;
      }

      /* 🔆 Điều chỉnh độ sáng khi ghi hình */
      .brightness-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 40px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: inherit;
        font-size: 14px;
        white-space: nowrap;
      }
      .brightness-control input[type="range"] {
        width: 110px;
        accent-color: var(--action-lead);
        cursor: pointer;
      }
      #brightnessValue {
        min-width: 42px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        opacity: 0.85;
      }

      @keyframes recordingPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(255, 59, 48, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
        }
      }
      button.btn-recording-active {
        background: #ff3b30 !important;
        color: #ffffff !important;
        animation: recordingPulse 1.5s infinite;
      }

      /* --- Toast Notification --- */
      .toast-notification {
        position: fixed;
        top: 25px;
        right: 0px;
        background: rgba(255, 255, 255, 0.95);
        color: var(--text-neutral);
        border-left: 5px solid var(--action-lead);
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(138, 10, 10, 0.15);
        font-weight: bold;
        font-size: 13px;
        z-index: 10000;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: none;
      }
      .toast-notification.show {
        transform: translateX(0);
      }

      /* --- Overlays --- */
      .full-overlay {
        position: fixed;
        inset: 0;
        background: rgba(243, 216, 230, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }
      .full-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .overlay-card {
        background: var(--surface-white);
        padding: 50px;
        border-radius: 24px;
        border: 1px solid rgba(138, 10, 10, 0.2);
        text-align: center;
        width: 450px;
        box-shadow: 0 40px 80px rgba(138, 10, 10, 0.2);
        animation: cardEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes cardEntrance {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      #licenseKey {
        width: 100%;
        padding: 15px;
        border-radius: 100px;
        border: 2px solid rgba(138, 10, 10, 0.3);
        text-align: center;
        margin: 20px 0 10px 0;
        font-weight: bold;
        font-family: "Courier New", monospace;
        font-size: 16px;
        color: var(--action-lead);
        transition: border-color 0.3s;
        outline: none;
      }
      #licenseKey:focus {
        border-color: var(--action-lead);
      }

      .license-status {
        font-weight: 700;
        font-size: 12px;
        margin-top: 10px;
        display: block;
        color: #2d6a4f;
      }
      .trial-hint {
        font-size: 11px;
        color: var(--text-neutral);
        margin-top: 15px;
        display: block;
        font-weight: 600;
      }
    </style>

    <!-- Toast Notification Container -->

    <script>
      /* =======================================================
            1. UI FEATURES LOGIC
            ======================================================= */
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("liveClock").textContent =
          hours + ":" + minutes + " " + ampm;
      }
      setInterval(updateClock, 1000);
      updateClock();

      /* =======================================================
           🔓 MỞ KHÓA GHI HÌNH + LUT (bấm 6 lần liên tiếp vào màn hình)
           ======================================================= */
      let recUnlocked = false;
      (function setupRecordUnlock() {
        const btn = document.getElementById("btnRecord");
        const wrapper = document.querySelector(".preview-wrapper");
        if (!btn || !wrapper) return;

        // Hiện cả nút Ghi Hình lẫn bộ điều khiển LUT
        const reveal = () => {
          recUnlocked = true;
          btn.classList.remove("rec-hidden");
          const lutLoadBtn = document.getElementById("btnLutLoad");
          if (lutLoadBtn) lutLoadBtn.classList.remove("rec-hidden");
          const brightnessCtrl = document.getElementById("brightnessControl");
          if (brightnessCtrl) brightnessCtrl.classList.remove("rec-hidden");
          // Hiện nút Bật/Tắt LUT nếu đã có LUT nạp sẵn từ phiên trước
          applyLutUiState();
        };

        // Đã mở khóa trước đó -> hiện luôn, không cần bấm lại
        if (localStorage.getItem("recUnlocked") === "1") {
          reveal();
          return;
        }

        const UNLOCK_CLICKS = 6;
        const WINDOW_MS = 3000; // 6 cú bấm phải nằm trong 3 giây kể từ cú đầu
        let clickCount = 0;
        let windowTimer = null;

        wrapper.addEventListener("click", () => {
          if (!btn.classList.contains("rec-hidden")) return; // đã mở khóa

          clickCount++;
          if (clickCount === 1) {
            windowTimer = setTimeout(() => {
              clickCount = 0;
            }, WINDOW_MS);
          }

          if (clickCount >= UNLOCK_CLICKS) {
            clearTimeout(windowTimer);
            clickCount = 0;
            localStorage.setItem("recUnlocked", "1");
            reveal();
            showNotification("🎬 Đã mở khóa nút Ghi Hình!");
          }
        });
      })();

      function toggleGrid() {
        document.getElementById("gridOverlay").classList.toggle("visible");
        document.getElementById("btnGrid").classList.toggle("active");
      }

      function togglePerf() {
        document.getElementById("perfMonitor").classList.toggle("hidden");
        document.getElementById("btnPerf").classList.toggle("active");
      }

      /* =======================================================
            2. PERFORMANCE MONITORING
            ======================================================= */
      let perfInterval = null;
      function trackPerformance(track) {
        if (perfInterval) clearInterval(perfInterval);
        const perfRes = document.getElementById("perfRes");
        const perfFps = document.getElementById("perfFps");
        const perfName = document.getElementById("perfName");

        perfName.textContent =
          track.label.substring(0, 15) + (track.label.length > 15 ? "..." : "");

        perfInterval = setInterval(() => {
          const settings = track.getSettings();
          perfRes.textContent = `${settings.width || 0}x${settings.height || 0}`;
          perfFps.textContent = Math.round(settings.frameRate || 0);
        }, 1000);
      }

      /* =======================================================
           2.5 COLOR PIPELINE (WebGL: brightness + 3D LUT .cube)
           =======================================================
           Áp dụng độ sáng và LUT trên GPU. Canvas WebGL vừa là
           hình hiển thị (live preview) vừa là nguồn ghi hình, nên
           màu xem trước và màu trong file luôn giống nhau. */
      let gl = null;
      let glProgram = null;
      let glReady = false; // WebGL khởi tạo thành công?
      let glActive = false; // có đang chạy vòng render không?
      let glRAF = null;
      let videoTexture = null;
      let lutTexture = null;
      let glLocs = {};
      let glPreviewEl = null;

      // Trạng thái LUT
      let lutEnabled = false; // người dùng bật/tắt
      let lutLoaded = false; // đã có dữ liệu LUT trên GPU
      let lutSize = 0;
      let pendingLut = null; // LUT đã parse nhưng chờ GPU sẵn sàng
      let lutName = "";

      const VERT_SRC = `
        attribute vec2 aPos;
        varying vec2 vUv;
        void main() {
          vUv = (aPos + 1.0) / 2.0;
          gl_Position = vec4(aPos, 0.0, 1.0);
        }`;

      // LUT đóng gói dạng ảnh 2D: rộng = N (đỏ), cao = N*N (lục trong lát, lam chọn lát).
      const FRAG_SRC = `
        precision highp float;
        varying vec2 vUv;
        uniform sampler2D uVideo;
        uniform sampler2D uLut;
        uniform float uBrightness;
        uniform float uLutEnabled;
        uniform float uLutSize;

        vec3 applyLUT(vec3 color) {
          float size = uLutSize;
          vec3 c = clamp(color, 0.0, 1.0);
          float r = c.r * (size - 1.0);
          float g = c.g * (size - 1.0);
          float b = c.b * (size - 1.0);
          float bLow = floor(b);
          float bHigh = min(bLow + 1.0, size - 1.0);
          float bf = b - bLow;
          float u = (r + 0.5) / size;
          float vLow = (bLow * size + g + 0.5) / (size * size);
          float vHigh = (bHigh * size + g + 0.5) / (size * size);
          vec3 cl = texture2D(uLut, vec2(u, vLow)).rgb;
          vec3 ch = texture2D(uLut, vec2(u, vHigh)).rgb;
          return mix(cl, ch, bf);
        }

        void main() {
          vec3 color = texture2D(uVideo, vUv).rgb;
          color *= uBrightness;
          if (uLutEnabled > 0.5) {
            color = applyLUT(clamp(color, 0.0, 1.0));
          }
          gl_FragColor = vec4(color, 1.0);
        }`;

      function compileShader(type, src) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, src);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
          throw new Error("Shader lỗi: " + gl.getShaderInfoLog(sh));
        }
        return sh;
      }

      // Khởi tạo WebGL một lần (lazy). Trả về true nếu sẵn sàng.
      function initGL() {
        if (glReady) return true;
        glPreviewEl = document.getElementById("glPreview");
        try {
          gl =
            glPreviewEl.getContext("webgl", { preserveDrawingBuffer: true }) ||
            glPreviewEl.getContext("experimental-webgl", {
              preserveDrawingBuffer: true,
            });
          if (!gl) return false;

          glProgram = gl.createProgram();
          gl.attachShader(glProgram, compileShader(gl.VERTEX_SHADER, VERT_SRC));
          gl.attachShader(
            glProgram,
            compileShader(gl.FRAGMENT_SHADER, FRAG_SRC),
          );
          gl.linkProgram(glProgram);
          if (!gl.getProgramParameter(glProgram, gl.LINK_STATUS)) {
            throw new Error(gl.getProgramInfoLog(glProgram));
          }
          gl.useProgram(glProgram);

          // Quad toàn màn hình
          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(
            gl.ARRAY_BUFFER,
            new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
            gl.STATIC_DRAW,
          );
          const aPos = gl.getAttribLocation(glProgram, "aPos");
          gl.enableVertexAttribArray(aPos);
          gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

          glLocs = {
            uVideo: gl.getUniformLocation(glProgram, "uVideo"),
            uLut: gl.getUniformLocation(glProgram, "uLut"),
            uBrightness: gl.getUniformLocation(glProgram, "uBrightness"),
            uLutEnabled: gl.getUniformLocation(glProgram, "uLutEnabled"),
            uLutSize: gl.getUniformLocation(glProgram, "uLutSize"),
          };

          videoTexture = createTexture();
          lutTexture = createTexture();
          // 1x1 trắng để texture LUT luôn "hoàn chỉnh" khi chưa nạp .cube
          gl.bindTexture(gl.TEXTURE_2D, lutTexture);
          gl.texImage2D(
            gl.TEXTURE_2D,
            0,
            gl.RGBA,
            1,
            1,
            0,
            gl.RGBA,
            gl.UNSIGNED_BYTE,
            new Uint8Array([255, 255, 255, 255]),
          );

          glReady = true;

          // Nếu có LUT đang chờ (khôi phục từ localStorage) -> nạp lên GPU
          if (pendingLut) {
            uploadLutTexture(pendingLut);
            pendingLut = null;
          }
          return true;
        } catch (e) {
          console.warn("WebGL không khả dụng, dùng chế độ dự phòng:", e);
          gl = null;
          glReady = false;
          return false;
        }
      }

      function createTexture() {
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        return tex;
      }

      // Bật pipeline WebGL khi có nguồn phát. Dự phòng nếu WebGL hỏng.
      function ensureGlPipeline() {
        if (!initGL()) {
          // Không có WebGL: giữ nguyên hành vi cũ (hiện video, lọc CSS)
          if (glPreviewEl) glPreviewEl.classList.remove("active");
          return;
        }
        glActive = true;
        glPreviewEl.classList.add("active");
        if (!glRAF) glRender();
      }

      function stopGlPipeline() {
        glActive = false;
        if (glRAF) {
          cancelAnimationFrame(glRAF);
          glRAF = null;
        }
        if (glPreviewEl) glPreviewEl.classList.remove("active");
      }

      function glRender() {
        glRAF = null;
        if (!glActive || !glReady) return;

        if (preview.readyState >= 2 && preview.videoWidth) {
          // Đồng bộ kích thước buffer canvas với độ phân giải video
          if (
            glPreviewEl.width !== preview.videoWidth ||
            glPreviewEl.height !== preview.videoHeight
          ) {
            glPreviewEl.width = preview.videoWidth;
            glPreviewEl.height = preview.videoHeight;
            gl.viewport(0, 0, glPreviewEl.width, glPreviewEl.height);
          }

          // Nạp khung video hiện tại
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, videoTexture);
          gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
          gl.texImage2D(
            gl.TEXTURE_2D,
            0,
            gl.RGB,
            gl.RGB,
            gl.UNSIGNED_BYTE,
            preview,
          );
          gl.uniform1i(glLocs.uVideo, 0);

          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, lutTexture);
          gl.uniform1i(glLocs.uLut, 1);

          gl.uniform1f(glLocs.uBrightness, recBrightness);
          gl.uniform1f(
            glLocs.uLutEnabled,
            lutEnabled && lutLoaded ? 1.0 : 0.0,
          );
          gl.uniform1f(glLocs.uLutSize, lutSize || 2);

          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        glRAF = requestAnimationFrame(glRender);
      }

      /* ---------- Parse & nạp LUT .cube ---------- */
      function parseCube(text) {
        const lines = text.split(/\r?\n/);
        let size = 0;
        const data = [];
        for (const raw of lines) {
          const line = raw.trim();
          if (!line || line.startsWith("#")) continue;
          const upper = line.toUpperCase();
          if (upper.startsWith("TITLE")) continue;
          if (upper.startsWith("LUT_3D_SIZE")) {
            size = Number.parseInt(line.split(/\s+/)[1], 10);
            continue;
          }
          if (upper.startsWith("LUT_1D_SIZE")) {
            throw new Error("File LUT 1D chưa được hỗ trợ (chỉ hỗ trợ 3D).");
          }
          if (upper.startsWith("DOMAIN_MIN") || upper.startsWith("DOMAIN_MAX"))
            continue;
          const p = line.split(/\s+/);
          if (p.length >= 3) {
            const r = parseFloat(p[0]);
            const g = parseFloat(p[1]);
            const b = parseFloat(p[2]);
            if (!isNaN(r) && !isNaN(g) && !isNaN(b)) data.push(r, g, b);
          }
        }
        if (!size || data.length !== size * size * size * 3) {
          throw new Error("File .cube không hợp lệ hoặc thiếu dữ liệu.");
        }
        return { size, data };
      }

      // Đóng gói LUT 3D thành ảnh 2D (rộng=N, cao=N*N) và nạp lên GPU.
      function uploadLutTexture(parsed) {
        if (!glReady) {
          pendingLut = parsed;
          return;
        }
        const N = parsed.size;
        const src = parsed.data;
        const width = N;
        const height = N * N;
        const buf = new Uint8Array(width * height * 4);
        const to255 = (x) => Math.round(Math.min(Math.max(x, 0), 1) * 255);
        for (let b = 0; b < N; b++) {
          for (let g = 0; g < N; g++) {
            for (let r = 0; r < N; r++) {
              const L = (r + g * N + b * N * N) * 3; // .cube: đỏ biến thiên nhanh nhất
              const X = r;
              const Y = b * N + g;
              const dst = (Y * width + X) * 4;
              buf[dst] = to255(src[L]);
              buf[dst + 1] = to255(src[L + 1]);
              buf[dst + 2] = to255(src[L + 2]);
              buf[dst + 3] = 255;
            }
          }
        }
        gl.activeTexture(gl.TEXTURE1);
        gl.bindTexture(gl.TEXTURE_2D, lutTexture);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
        gl.texImage2D(
          gl.TEXTURE_2D,
          0,
          gl.RGBA,
          width,
          height,
          0,
          gl.RGBA,
          gl.UNSIGNED_BYTE,
          buf,
        );
        lutSize = N;
        lutLoaded = true;
      }

      /* ---------- UI handlers cho LUT ---------- */
      function openLutPicker() {
        document.getElementById("lutFileInput").click();
      }

      function handleLutFile(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = parseCube(String(reader.result));
            uploadLutTexture(parsed);
            lutName = file.name;
            lutEnabled = true;
            applyLutUiState();
            persistLut(String(reader.result), file.name);
            showNotification("🎨 Đã áp dụng LUT: " + file.name);
          } catch (e) {
            alert("Lỗi đọc LUT: " + e.message);
          }
        };
        reader.readAsText(file);
        event.target.value = ""; // cho phép chọn lại cùng file
      }

      function toggleLut() {
        if (!lutLoaded) {
          openLutPicker();
          return;
        }
        lutEnabled = !lutEnabled;
        applyLutUiState();
        try {
          localStorage.setItem("lutEnabled", lutEnabled ? "1" : "0");
        } catch (e) {
          /* bỏ qua nếu localStorage đầy */
        }
      }

      function applyLutUiState() {
        const toggle = document.getElementById("btnLutToggle");
        if (!toggle) return;
        if (lutLoaded && recUnlocked) {
          toggle.classList.remove("rec-hidden");
          toggle.classList.toggle("active", lutEnabled);
          toggle.innerHTML = lutEnabled ? "🎨 LUT: Bật" : "🎨 LUT: Tắt";
          toggle.title = lutName
            ? "LUT: " + lutName
            : "Bật/Tắt LUT";
        } else {
          toggle.classList.add("rec-hidden");
        }
      }

      function persistLut(cubeText, name) {
        try {
          // ~3MB giới hạn an toàn cho localStorage
          if (cubeText.length > 3_000_000) {
            showNotification(
              "⚠️ LUT quá lớn để ghi nhớ — vẫn dùng được trong phiên này.",
            );
            return;
          }
          localStorage.setItem("lutCube", cubeText);
          localStorage.setItem("lutName", name);
          localStorage.setItem("lutEnabled", "1");
        } catch (e) {
          /* bỏ qua nếu localStorage đầy */
        }
      }

      // Khôi phục LUT đã lưu (gọi lúc tải trang). Nạp GPU khi pipeline sẵn sàng.
      function restoreSavedLut() {
        let cubeText = null;
        try {
          cubeText = localStorage.getItem("lutCube");
        } catch (e) {
          return;
        }
        if (!cubeText) return;
        try {
          const parsed = parseCube(cubeText);
          uploadLutTexture(parsed); // -> pendingLut nếu GL chưa init
          lutName = localStorage.getItem("lutName") || "LUT";
          lutEnabled = localStorage.getItem("lutEnabled") !== "0";
          lutLoaded = true; // dữ liệu hợp lệ; sẽ lên GPU khi initGL chạy
          applyLutUiState();
        } catch (e) {
          /* LUT lưu hỏng -> bỏ qua */
        }
      }

      /* =======================================================
           3. VIDEO RECORDING FEATURE (30s LIMIT & NOTIFICATION)
           ======================================================= */
      let mediaRecorder = null;
      let recordedChunks = [];
      let isRecording = false;

      // Biến phục vụ Timer & Giới hạn 30 giây
      let recordStartTime = 0;
      let recordTimerInterval = null;
      let recordLimitTimeout = null; // Quản lý thời gian tự động dừng

      // 🔆 Độ sáng + pipeline canvas (để độ sáng được "nướng" vào file ghi)
      let recBrightness = 1; // 1 = 100%
      let recCanvas = null;
      let recCtx = null;
      let recCanvasStream = null;
      let recDrawActive = false;
      let recDrawRAF = null;

      function setBrightness(val) {
        recBrightness = Number(val) / 100;
        document.documentElement.style.setProperty(
          "--rec-brightness",
          recBrightness,
        );
        const lbl = document.getElementById("brightnessValue");
        if (lbl) lbl.textContent = val + "%";
      }

      // Hàm format giây sang MM:SS hoặc HH:MM:SS
      function formatTime(totalSeconds) {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60)
          .toString()
          .padStart(2, "0");
        const s = Math.floor(totalSeconds % 60)
          .toString()
          .padStart(2, "0");
        if (h > 0) return `${h.toString().padStart(2, "0")}:${m}:${s}`;
        return `${m}:${s}`;
      }

      // Hàm hiển thị thông báo thân thiện tự động ẩn sau 3 giây
      function showNotification(message) {
        const toast = document.getElementById("toastNotification");
        toast.innerHTML = `<span>🎥</span> <span>${message}</span>`;
        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      function toggleRecording() {
        if (!currentStream) {
          alert(
            "⚠️ Vui lòng chọn nguồn phát (Camera/Screen) trước khi bắt đầu ghi hình!",
          );
          return;
        }

        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      }

      function startRecording() {
        recordedChunks = [];
        try {
          // 1. ƯU TIÊN MP4 (Khắc phục lỗi WebM trên Windows)
          let selectedMimeType = "";
          const types = [
            "video/mp4;codecs=h264,aac",
            "video/mp4",
            "video/webm;codecs=vp9,opus",
            "video/webm;codecs=vp8,opus",
            "video/webm",
          ];

          for (let type of types) {
            if (MediaRecorder.isTypeSupported(type)) {
              selectedMimeType = type;
              break;
            }
          }

          const options = {
            mimeType: selectedMimeType,
            videoBitsPerSecond: 8000000,
          };

          // Nguồn ghi: ưu tiên canvas WebGL (đã có độ sáng + LUT "nướng" vào hình).
          // MediaRecorder chỉ ghi luồng, không ghi bộ lọc CSS — nên phải ghi từ canvas.
          if (glReady && glActive) {
            recCanvasStream = glPreviewEl.captureStream(30);
          } else {
            // Dự phòng khi không có WebGL: canvas 2D chỉ áp dụng độ sáng.
            const vw = preview.videoWidth || 1920;
            const vh = preview.videoHeight || 1080;
            recCanvas = document.createElement("canvas");
            recCanvas.width = vw;
            recCanvas.height = vh;
            recCtx = recCanvas.getContext("2d");
            recDrawActive = true;
            const drawFrame = () => {
              if (!recDrawActive) return;
              recCtx.filter = "brightness(" + recBrightness + ")";
              recCtx.drawImage(preview, 0, 0, recCanvas.width, recCanvas.height);
              recDrawRAF = requestAnimationFrame(drawFrame);
            };
            drawFrame();
            recCanvasStream = recCanvas.captureStream(30);
          }

          // Ghi kèm audio gốc nếu có
          currentStream.getAudioTracks().forEach((t) => {
            recCanvasStream.addTrack(t);
          });

          mediaRecorder = new MediaRecorder(recCanvasStream, options);

          mediaRecorder.ondataavailable = function (event) {
            if (event.data.size > 0) {
              recordedChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = function () {
            const rawBlob = new Blob(recordedChunks, {
              type: selectedMimeType,
            });
            const ext = selectedMimeType.includes("mp4") ? "mp4" : "webm";
            const durationMs = Date.now() - recordStartTime;

            // Hàm xử lý Download
            const triggerDownload = (finalBlob) => {
              const url = URL.createObjectURL(finalBlob);
              const a = document.createElement("a");
              document.body.appendChild(a);
              a.style = "display: none";
              a.href = url;
              const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
              a.download = `Filmong-HQ-${timestamp}.${ext}`;
              a.click();
              setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
              }, 100);
            };

            // Chạy fix-webm-duration CHỈ KHI định dạng thực sự là WebM
            if (ext === "webm" && typeof ysFixWebmDuration !== "undefined") {
              ysFixWebmDuration(rawBlob, durationMs, function (fixedBlob) {
                triggerDownload(fixedBlob);
              });
            } else {
              triggerDownload(rawBlob);
            }
          };

          mediaRecorder.start();
          isRecording = true;

          // Chuyển đổi class của Container sang chế độ RECORDING
          const recUI = document.getElementById("recIndicatorUI");
          recUI.classList.remove("previewing");
          recUI.classList.add("recording");

          // Bộ đếm giờ (Timer)
          recordStartTime = Date.now();
          document.getElementById("recText").textContent = "REC • 00:00";

          recordTimerInterval = setInterval(() => {
            const elapsedSec = Math.floor(
              (Date.now() - recordStartTime) / 1000,
            );
            document.getElementById("recText").textContent =
              `REC • ${formatTime(elapsedSec)}`;
          }, 1000);

          // TỰ ĐỘNG DỪNG GHI VÀO MỐC 30 GIÂY
          recordLimitTimeout = setTimeout(() => {
            if (isRecording) {
              stopRecording();
              showNotification(
                "Đã đủ 30s! Video đang được tải xuống tự động. ✨",
              );
            }
          }, 30000);

          // Đổi UI Nút
          const btnRecord = document.getElementById("btnRecord");
          btnRecord.innerHTML = "⏹ Dừng Ghi";
          btnRecord.classList.add("btn-recording-active");
        } catch (e) {
          recDrawActive = false;
          if (recDrawRAF) {
            cancelAnimationFrame(recDrawRAF);
            recDrawRAF = null;
          }
          alert("Lỗi khi khởi tạo ghi hình: " + e.message);
        }
      }

      function stopRecording() {
        // Hủy bộ đếm thời gian giới hạn 30 giây nếu người dùng nhấn dừng thủ công
        if (recordLimitTimeout) {
          clearTimeout(recordLimitTimeout);
          recordLimitTimeout = null;
        }

        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        isRecording = false;

        // 🔆 Dừng vòng vẽ canvas độ sáng và giải phóng luồng canvas
        recDrawActive = false;
        if (recDrawRAF) {
          cancelAnimationFrame(recDrawRAF);
          recDrawRAF = null;
        }
        if (recCanvasStream) {
          recCanvasStream.getTracks().forEach((t) => t.stop());
          recCanvasStream = null;
        }

        // Trả lại class Container về chế độ PREVIEWING thông thường
        const recUI = document.getElementById("recIndicatorUI");
        recUI.classList.remove("recording");
        recUI.classList.add("previewing");

        // Reset UI Timer
        clearInterval(recordTimerInterval);
        document.getElementById("recText").textContent = "LIVE PREVIEW";

        const btnRecord = document.getElementById("btnRecord");
        btnRecord.innerHTML = "🔴 Ghi Hình";
        btnRecord.classList.remove("btn-recording-active");
      }

      /* =======================================================
            4. CORE CAMERA LOGIC
            ======================================================= */
      const preview = document.getElementById("preview");
      const sourceSelector = document.getElementById("sourceSelector");
      const toolbar = document.getElementById("toolbar");
      const cameraSelect = document.getElementById("cameraSelect");

      let currentStream = null;
      let isFlippedH = true; // Đặt mặc định trạng thái ban đầu là bật (true)
      let isFlippedV = false;

      function toggleFlipH() {
        isFlippedH = !isFlippedH;
        preview.classList.toggle("flipped", isFlippedH);
        // Canvas WebGL là lớp đang hiển thị nên cũng phải lật theo
        document
          .getElementById("glPreview")
          .classList.toggle("flipped", isFlippedH);
        document
          .getElementById("btnFlipH")
          .classList.toggle("active", isFlippedH);
      }

      function toggleFlipV() {
        isFlippedV = !isFlippedV;
        preview.classList.toggle("flipped-v", isFlippedV);
        document
          .getElementById("glPreview")
          .classList.toggle("flipped-v", isFlippedV);
        document
          .getElementById("btnFlipV")
          .classList.toggle("active", isFlippedV);
      }

      function stopStream() {
        // Tự động dừng quay và lưu video nếu tắt nguồn camera đột ngột
        if (isRecording) {
          stopRecording();
        }

        if (currentStream) {
          currentStream.getTracks().forEach((t) => t.stop());
          currentStream = null;
        }
        stopGlPipeline();
        if (perfInterval) {
          clearInterval(perfInterval);
          perfInterval = null;
        }
        document.getElementById("perfRes").textContent = "0x0";
        document.getElementById("perfFps").textContent = "0";
      }

      const optimizedConstraints = {
        video: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 60 },
          noiseSuppression: false,
          autoGainControl: false,
          echoCancellation: false,
        },
        audio: false,
      };

      async function startCamera() {
        stopStream();
        try {
          const stream =
            await navigator.mediaDevices.getUserMedia(optimizedConstraints);
          currentStream = stream;
          preview.srcObject = stream;
          ensureGlPipeline();
          trackPerformance(stream.getVideoTracks()[0]);
          document.getElementById("sourceSelector").classList.add("hidden");
          await loadCameras();
          cameraSelect.classList.remove("hidden");
        } catch (e) {
          alert("Camera Error: " + e.message);
        }
      }

      async function startScreen() {
        stopStream();
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });
          currentStream = stream;
          preview.srcObject = stream;
          ensureGlPipeline();
          trackPerformance(stream.getVideoTracks()[0]);
          document.getElementById("sourceSelector").classList.add("hidden");
        } catch (e) {
          alert("Screen Error: " + e.message);
        }
      }

      async function loadCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter((d) => d.kind === "videoinput");
        cameraSelect.innerHTML = "";
        cameras.forEach((cam, i) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || `Cam ${i + 1}`;
          cameraSelect.appendChild(opt);
        });
      }

      async function switchCamera() {
        stopStream();
        const switchConstraints = {
          video: {
            deviceId: { exact: cameraSelect.value },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 60 },
            noiseSuppression: false,
            autoGainControl: false,
            echoCancellation: false,
          },
          audio: false,
        };
        try {
          const stream =
            await navigator.mediaDevices.getUserMedia(switchConstraints);
          currentStream = stream;
          preview.srcObject = stream;
          ensureGlPipeline();
          trackPerformance(stream.getVideoTracks()[0]);
        } catch (e) {
          alert("Switch Camera Error: " + e.message);
        }
      }

      function changeSource() {
        stopStream();
        document.getElementById("sourceSelector").classList.remove("hidden");
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }

      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement)
          document.body.classList.add("fullscreen-mode");
        else {
          document.body.classList.remove("fullscreen-mode");
          toolbar.classList.remove("show-toolbar");
        }
      });
      document.addEventListener("mousemove", (e) => {
        if (!document.fullscreenElement) return;
        if (window.innerHeight - e.clientY < 100)
          toolbar.classList.add("show-toolbar");
        else toolbar.classList.remove("show-toolbar");
      });

      /* =======================================================
            5. SECURE API LICENSE LOGIC
            ======================================================= */
      const licenseOverlay = document.getElementById("licenseOverlay");
      const licenseKeyInput = document.getElementById("licenseKey");
      const licenseError = document.getElementById("licenseError");
      const licenseStatus = document.getElementById("licenseStatus");
      const activateBtn = document.getElementById("activateBtn");

      let licenseInfo = null;
      let trialExpiresAt = null;

      async function generateFingerprint() {
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 200;
          canvas.height = 50;
          ctx.fillStyle = "#f60";
          ctx.fillRect(0, 0, 200, 50);
          ctx.fillText("FP:" + navigator.userAgent, 2, 25);
          const data = [
            navigator.userAgent,
            navigator.language,
            screen.colorDepth,
            canvas.toDataURL(),
          ].join("|");
          const encoder = new TextEncoder();
          const buffer = await crypto.subtle.digest(
            "SHA-256",
            encoder.encode(data),
          );
          return Array.from(new Uint8Array(buffer))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("")
            .slice(0, 32);
        } catch (err) {
          return "unknown";
        }
      }

      async function handleActivate() {
        const key = licenseKeyInput.value.trim().toUpperCase();
        if (!key.match(/^LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}$/)) {
          licenseError.textContent = "Format required: LIVE-XXXX-XXXX-XXXX";
          return;
        }
        activateBtn.disabled = true;
        licenseError.textContent = "Activating...";
        try {
          const fingerprint = await generateFingerprint();
          const res = await fetch("/api/activate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              key,
              fingerprint,
              userAgent: navigator.userAgent,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            licenseError.textContent =
              data.message || data.error || "Activation failed";
            activateBtn.disabled = false;
            return;
          }
          licenseInfo = data;
          localStorage.setItem("license_key", key);
          localStorage.setItem("license_fingerprint", fingerprint);
          localStorage.setItem("license_expires", data.expires_at || "null");
          localStorage.setItem("license_activated", Date.now().toString());
          licenseOverlay.classList.add("hidden");
          document.getElementById("sourceSelector").classList.remove("hidden");
          startLicenseHeartbeat();
        } catch (err) {
          licenseError.textContent = "Network error. Check connection.";
          activateBtn.disabled = false;
        }
      }

      async function validateLicense() {
        const key = localStorage.getItem("license_key");
        const fingerprint = localStorage.getItem("license_fingerprint");
        if (!key || !fingerprint) return false;
        try {
          const res = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, fingerprint }),
          });
          const data = await res.json();
          if (data.valid) {
            licenseInfo = data;
            localStorage.setItem("license_last_check", Date.now().toString());
            return true;
          }
        } catch (err) {
          return checkOfflineGrace();
        }
        return false;
      }

      function checkOfflineGrace() {
        const lastCheck = localStorage.getItem("license_last_check");
        return lastCheck ? Date.now() < parseInt(lastCheck) + 86400000 : false;
      }

      function updateLicenseStatus() {
        if (licenseInfo) licenseStatus.textContent = "✓ SYSTEM ACTIVATED";
        else if (trialExpiresAt) {
          const remaining = Math.ceil((trialExpiresAt - Date.now()) / 60000);
          if (remaining > 0)
            licenseStatus.textContent = `⏱ Trial mode: ${remaining}m remaining`;
          else
            licenseStatus.textContent = "⏱ Trial expired. Activation required.";
        }
      }

      function startTrialMode() {
        trialExpiresAt = Date.now() + 10 * 60 * 1000;
        licenseOverlay.classList.add("hidden");
        document.getElementById("sourceSelector").classList.remove("hidden");
        updateLicenseStatus();
        setInterval(() => {
          updateLicenseStatus();
          if (Date.now() >= trialExpiresAt && !licenseInfo) {
            licenseOverlay.classList.remove("hidden");
            document.getElementById("sourceSelector").classList.add("hidden");
            stopStream();
          }
        }, 60000);
      }

      function startLicenseHeartbeat() {
        setInterval(validateLicense, 300000);
        updateLicenseStatus();
      }

      const originalStartCamera = window.startCamera;
      window.startCamera = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartCamera();
      };

      const originalStartScreen = window.startScreen;
      window.startScreen = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartScreen();
      };

      async function initLicenseFlow() {
        const savedKey = localStorage.getItem("license_key");
        if (savedKey) {
          const valid = await validateLicense();
          if (valid) {
            licenseOverlay.classList.add("hidden");
            document
              .getElementById("sourceSelector")
              .classList.remove("hidden");
            startLicenseHeartbeat();
            return;
          } else {
            localStorage.removeItem("license_key");
            localStorage.removeItem("license_fingerprint");
          }
        }
      }
      if (document.readyState === "loading")
        document.addEventListener("DOMContentLoaded", initLicenseFlow);
      else initLicenseFlow();

      // 🎨 Khôi phục LUT đã lưu từ phiên trước (đặt ở cuối script để
      // mọi biến/hàm của color pipeline đã được khởi tạo xong).
      restoreSavedLut();
    </script>
  </body>
</html>
