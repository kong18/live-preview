<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Preview - Flip Horizontal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 20px;
            background: #1a1a2e;
            z-index: 10;
            flex-wrap: wrap;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .fullscreen-mode .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-mode .toolbar.toolbar-visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .fullscreen-mode .info-bar {
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .toolbar button, .toolbar select {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .toolbar button {
            background: #16213e;
            color: #e0e0e0;
        }

        .toolbar button:hover {
            background: #0f3460;
        }

        .toolbar button.active {
            background: #e94560;
            color: #fff;
        }

        .toolbar select {
            background: #16213e;
            color: #e0e0e0;
            outline: none;
        }

        .toolbar .status {
            font-size: 12px;
            color: #888;
            margin-left: 10px;
        }

        .preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #preview {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        #preview.flipped {
            transform: scaleX(-1);
        }

        #preview.flipped-v {
            transform: scaleY(-1);
        }

        #preview.flipped.flipped-v {
            transform: scaleX(-1) scaleY(-1);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(233, 69, 96, 0.8);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fullscreen-btn:hover {
            background: rgba(233, 69, 96, 1);
            transform: scale(1.1);
        }

        .source-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 20px;
        }

        .source-selector h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .source-selector .source-btn {
            padding: 16px 40px;
            font-size: 18px;
            border: 2px solid #e94560;
            background: transparent;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 280px;
            text-align: center;
        }

        .source-selector .source-btn:hover {
            background: #e94560;
        }

        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .hidden { display: none !important; }

        /* License Overlay Styles */
        .license-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .license-overlay.hidden {
            display: none !important;
        }

        .license-box {
            background: #1a1a2e;
            border: 2px solid #e94560;
            border-radius: 12px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .license-box h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e94560;
        }

        .license-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .license-box input::placeholder {
            color: #666;
        }

        .license-box input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
        }

        .license-box button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .license-box button:hover:not(:disabled) {
            background: #ff5c7c;
            transform: translateY(-2px);
        }

        .license-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .license-box .error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 12px;
            min-height: 16px;
        }

        .license-box .trial-hint {
            display: block;
            color: #aaa;
            font-size: 11px;
            margin-top: 12px;
            line-height: 1.4;
        }

        .license-status {
            display: block;
            color: #88d498;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .toolbar { padding: 8px 10px; gap: 6px; }
            .toolbar button { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- License Activation Overlay -->
    <div id="licenseOverlay" class="license-overlay">
        <div class="license-box">
            <h3>🔑 Activate License</h3>
            <input
                type="text"
                id="licenseKey"
                placeholder="LIVE-XXXX-XXXX-XXXX"
                pattern="LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}"
                maxlength="23"
                autocomplete="off"
                spellcheck="false"
            />
            <button id="activateBtn" onclick="handleActivate()">Activate License</button>
            <p id="licenseError" class="error"></p>
            <small class="trial-hint">
                🎁 <strong>Trial Mode:</strong> 10 minutes without license key
                <br />(Limited features: flip & fullscreen disabled)
            </small>
            <small id="licenseStatus" class="license-status"></small>
        </div>
    </div>

    <!-- Source Selector -->
    <div class="source-selector" id="sourceSelector">
        <h2>Chọn nguồn video</h2>
        <button class="source-btn" onclick="startCamera()">📷 Camera (Webcam)</button>
        <button class="source-btn" onclick="startScreen()">🖥️ Chia sẻ màn hình</button>
        <button class="source-btn" onclick="startWindow()">🪟 Chia sẻ cửa sổ</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <button id="btnFlipH" onclick="toggleFlipH()">↔️ Flip Ngang</button>
        <button id="btnFlipV" onclick="toggleFlipV()">↕️ Flip Dọc</button>
        <select id="cameraSelect" class="hidden" onchange="switchCamera()"></select>
        <button onclick="changeSource()">🔄 Đổi nguồn</button>
        <button onclick="toggleFullscreen()">⛶ Toàn màn hình</button>
        <span class="status" id="statusText"></span>
    </div>

    <!-- Preview -->
    <div class="preview-container">
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <!-- Info -->
    <div class="info-bar" id="infoBar">
        Truy cập từ thiết bị khác cùng mạng: <strong id="lanUrl">đang tải...</strong>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const sourceSelector = document.getElementById('sourceSelector');
        const toolbar = document.getElementById('toolbar');
        const cameraSelect = document.getElementById('cameraSelect');
        const statusText = document.getElementById('statusText');
        const lanUrl = document.getElementById('lanUrl');

        let currentStream = null;
        let isFlippedH = false;
        let isFlippedV = false;

        // Flip Horizontal
        function toggleFlipH() {
            isFlippedH = !isFlippedH;
            preview.classList.toggle('flipped', isFlippedH);
            document.getElementById('btnFlipH').classList.toggle('active', isFlippedH);
            updateStatus();
        }

        // Flip Vertical
        function toggleFlipV() {
            isFlippedV = !isFlippedV;
            preview.classList.toggle('flipped-v', isFlippedV);
            document.getElementById('btnFlipV').classList.toggle('active', isFlippedV);
            updateStatus();
        }

        function updateStatus() {
            const parts = [];
            if (isFlippedH) parts.push('Flip Ngang');
            if (isFlippedV) parts.push('Flip Dọc');
            statusText.textContent = parts.length ? '🔄 ' + parts.join(' + ') : '';
        }

        // Stop current stream
        function stopStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
        }

        // Start Camera
        async function startCamera() {
            stopStream();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 165 } },
                    audio: false
                });
                currentStream = stream;
                preview.srcObject = stream;
                sourceSelector.classList.add('hidden');
                await loadCameras();
                cameraSelect.classList.remove('hidden');
            } catch (e) {
                alert('Không thể truy cập camera: ' + e.message);
            }
        }

        // Start Screen Share
        async function startScreen() {
            stopStream();
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
                    audio: false
                });
                currentStream = stream;
                preview.srcObject = stream;
                sourceSelector.classList.add('hidden');
                cameraSelect.classList.add('hidden');

                stream.getVideoTracks()[0].onended = () => {
                    changeSource();
                };
            } catch (e) {
                alert('Không thể chia sẻ màn hình: ' + e.message);
            }
        }

        // Start Window Share
        async function startWindow() {
            await startScreen(); // Same API, user picks window
        }

        // Load camera list
        async function loadCameras() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const cameras = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';
            cameras.forEach((cam, i) => {
                const opt = document.createElement('option');
                opt.value = cam.deviceId;
                opt.textContent = cam.label || `Camera ${i + 1}`;
                cameraSelect.appendChild(opt);
            });
        }

        // Switch camera
        async function switchCamera() {
            stopStream();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        deviceId: { exact: cameraSelect.value },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: 60 }
                    },
                    audio: false
                });
                currentStream = stream;
                preview.srcObject = stream;
            } catch (e) {
                alert('Không thể chuyển camera: ' + e.message);
            }
        }

        // Change source
        function changeSource() {
            stopStream();
            preview.srcObject = null;
            sourceSelector.classList.remove('hidden');
            cameraSelect.classList.add('hidden');
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Fullscreen toolbar auto-hide
        let toolbarTimeout = null;

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen-mode');
            } else {
                document.body.classList.remove('fullscreen-mode');
                toolbar.classList.remove('toolbar-visible');
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!document.fullscreenElement) return;
            if (e.clientY < 80) {
                toolbar.classList.add('toolbar-visible');
                clearTimeout(toolbarTimeout);
                toolbarTimeout = setTimeout(() => {
                    toolbar.classList.remove('toolbar-visible');
                }, 2000);
            }
        });

        toolbar.addEventListener('mouseenter', () => {
            if (!document.fullscreenElement) return;
            clearTimeout(toolbarTimeout);
            toolbar.classList.add('toolbar-visible');
        });

        toolbar.addEventListener('mouseleave', () => {
            if (!document.fullscreenElement) return;
            toolbarTimeout = setTimeout(() => {
                toolbar.classList.remove('toolbar-visible');
            }, 1000);
        });

        // Show LAN URL
        lanUrl.textContent = window.location.href;

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') toggleFlipH();
            if (e.key === 'v' || e.key === 'V') toggleFlipV();
            if (e.key === 'f' || e.key === 'F') toggleFullscreen();
            if (e.key === 'Escape' && currentStream) changeSource();
        });

        // ============================================
        // LICENSE MANAGEMENT SECTION
        // ============================================

        const licenseOverlay = document.getElementById('licenseOverlay');
        const licenseKeyInput = document.getElementById('licenseKey');
        const licenseError = document.getElementById('licenseError');
        const licenseStatus = document.getElementById('licenseStatus');
        const activateBtn = document.getElementById('activateBtn');

        let licenseInfo = null;
        let trialExpiresAt = null;
        let licenseValidation = null;

        /**
         * Generate lightweight machine fingerprint using browser APIs
         */
        async function generateFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 50;
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 200, 50);
                ctx.fillStyle = '#06f';
                ctx.fillText('FP:' + navigator.userAgent, 2, 25);

                const data = [
                    navigator.userAgent,
                    navigator.language,
                    navigator.hardwareConcurrency || 'unknown',
                    screen.colorDepth + 'x' + screen.pixelDepth,
                    canvas.toDataURL(),
                ].join('|');

                const encoder = new TextEncoder();
                const buffer = await crypto.subtle.digest('SHA-256', encoder.encode(data));
                return Array.from(new Uint8Array(buffer))
                    .map((b) => b.toString(16).padStart(2, '0'))
                    .join('')
                    .slice(0, 32);
            } catch (err) {
                console.error('Fingerprint generation failed:', err);
                return 'unknown';
            }
        }

        /**
         * Activate license key on this machine
         */
        async function handleActivate() {
            const key = licenseKeyInput.value.trim().toUpperCase();

            if (!key) {
                licenseError.textContent = 'Please enter a license key';
                return;
            }

            if (!key.match(/^LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}$/)) {
                licenseError.textContent = 'Invalid key format. Use: LIVE-XXXX-XXXX-XXXX';
                return;
            }

            activateBtn.disabled = true;
            licenseError.textContent = '';

            try {
                const fingerprint = await generateFingerprint();

                const res = await fetch('/api/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key,
                        fingerprint,
                        userAgent: navigator.userAgent,
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    licenseError.textContent = data.message || data.error || 'Activation failed';
                    activateBtn.disabled = false;
                    return;
                }

                // Success: store license info
                licenseInfo = data;
                localStorage.setItem('license_key', key);
                localStorage.setItem('license_fingerprint', fingerprint);
                localStorage.setItem('license_expires', data.expires_at || 'null');
                localStorage.setItem('license_activated', Date.now().toString());

                // Hide overlay and start preview
                hideLicenseOverlay();
                startLicenseHeartbeat();
            } catch (err) {
                console.error('Activation error:', err);
                licenseError.textContent = 'Network error. Check your connection.';
                activateBtn.disabled = false;
            }
        }

        /**
         * Hide license overlay and show preview
         */
        function hideLicenseOverlay() {
            licenseOverlay.classList.add('hidden');
            sourceSelector.classList.add('hidden'); // Will be shown by user action
            updateLicenseStatus();
        }

        /**
         * Show license overlay
         */
        function showLicenseOverlay() {
            licenseOverlay.classList.remove('hidden');
            licenseKeyInput.focus();
        }

        /**
         * Update license status display
         */
        function updateLicenseStatus() {
            if (licenseInfo) {
                const expiresMs = licenseInfo.expires_at
                    ? new Date(licenseInfo.expires_at).getTime() - Date.now()
                    : null;
                const days = expiresMs ? Math.ceil(expiresMs / (24 * 60 * 60 * 1000)) : null;

                if (days && days > 0) {
                    licenseStatus.textContent = `✓ License valid for ${days} days`;
                } else if (expiresMs === null) {
                    licenseStatus.textContent = '✓ License: Perpetual';
                }
            } else if (trialExpiresAt) {
                const remaining = Math.ceil((trialExpiresAt - Date.now()) / 1000 / 60);
                if (remaining > 0) {
                    licenseStatus.textContent = `⏱ Trial mode: ${remaining}m remaining`;
                } else {
                    licenseStatus.textContent = '⏱ Trial expired. Enter license key to continue.';
                }
            }
        }

        /**
         * Validate license (heartbeat check)
         */
        async function validateLicense() {
            const key = localStorage.getItem('license_key');
            const fingerprint = localStorage.getItem('license_fingerprint');

            if (!key || !fingerprint) {
                return false;
            }

            try {
                const res = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, fingerprint }),
                });

                const data = await res.json();

                if (data.valid) {
                    licenseInfo = data;
                    localStorage.setItem('license_expires', data.expires_at || 'null');
                    localStorage.setItem('license_last_check', Date.now().toString());
                    return true;
                }
            } catch (err) {
                console.warn('License validation failed (offline?)', err);
                return checkOfflineGrace();
            }

            return false;
        }

        /**
         * Check offline grace period (24 hours after last successful check)
         */
        function checkOfflineGrace() {
            const lastCheck = localStorage.getItem('license_last_check');
            if (!lastCheck) return false;

            const graceMs = 24 * 60 * 60 * 1000; // 24 hours
            const validUntil = parseInt(lastCheck) + graceMs;

            return Date.now() < validUntil;
        }

        /**
         * Start trial mode (10 minutes)
         */
        function startTrialMode() {
            trialExpiresAt = Date.now() + 10 * 60 * 1000; // 10 minutes
            licenseOverlay.classList.add('hidden');
            sourceSelector.classList.add('hidden');
            updateLicenseStatus();

            // Update status every minute
            const trialInterval = setInterval(() => {
                updateLicenseStatus();
                if (Date.now() >= trialExpiresAt) {
                    clearInterval(trialInterval);
                    if (!licenseInfo) {
                        showLicenseOverlay();
                    }
                }
            }, 60000);
        }

        /**
         * Start periodic license validation (every 5 minutes)
         */
        function startLicenseHeartbeat() {
            setInterval(validateLicense, 5 * 60 * 1000);
            updateLicenseStatus();
        }

        /**
         * Initialize license flow on page load
         */
        async function initLicenseFlow() {
            const savedKey = localStorage.getItem('license_key');

            if (savedKey) {
                // Try to validate existing license
                const valid = await validateLicense();
                if (valid) {
                    hideLicenseOverlay();
                    startLicenseHeartbeat();
                    return;
                } else {
                    // Clear invalid license
                    localStorage.removeItem('license_key');
                    localStorage.removeItem('license_fingerprint');
                }
            }

            // Show trial option or require license
            showLicenseOverlay();
        }

        // Intercept source selector buttons to require license/trial
        const originalStartCamera = window.startCamera;
        const originalStartScreen = window.startScreen;
        const originalStartWindow = window.startWindow;

        window.startCamera = async function () {
            if (!licenseInfo && !trialExpiresAt) {
                startTrialMode();
            } else if (trialExpiresAt && Date.now() >= trialExpiresAt) {
                showLicenseOverlay();
                return;
            }
            return originalStartCamera();
        };

        window.startScreen = async function () {
            if (!licenseInfo && !trialExpiresAt) {
                startTrialMode();
            } else if (trialExpiresAt && Date.now() >= trialExpiresAt) {
                showLicenseOverlay();
                return;
            }
            return originalStartScreen();
        };

        window.startWindow = async function () {
            if (!licenseInfo && !trialExpiresAt) {
                startTrialMode();
            } else if (trialExpiresAt && Date.now() >= trialExpiresAt) {
                showLicenseOverlay();
                return;
            }
            return originalStartWindow();
        };

        // Initialize license flow when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLicenseFlow);
        } else {
            initLicenseFlow();
        }
    </script>
</body>
</html>
