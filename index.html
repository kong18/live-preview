<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmong Live Preview</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --surface-primary: #f3d8e6;
        --action-lead: #8a0a0a;
        --surface-white: #ffffff;
        --text-neutral: #1a1a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        /* Y2K Dot Grid Pattern */
        background-color: var(--surface-primary);
        background-image: radial-gradient(
          rgba(138, 10, 10, 0.06) 2px,
          transparent 2px
        );
        background-size: 30px 30px;

        color: var(--text-neutral);
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* --- 🎨 NEW: Ambient Space-Filling Typography --- */
      /* These huge vertical texts fill the left/right whitespace beautifully without adding clutter */
      .ambient-text {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 15vw;
        font-weight: 900;
        color: rgba(138, 10, 10, 0.03); /* Extremely subtle */
        pointer-events: none;
        z-index: 0;
        white-space: nowrap;
        user-select: none;
      }
      .ambient-left {
        left: -5vw;
        writing-mode: vertical-rl;
        transform: translateY(-50%) rotate(180deg);
      }
      .ambient-right {
        right: -5vw;
        writing-mode: vertical-rl;
      }

      /* --- ✨ Filmong Branding --- */
      .brand-header {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 100;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .fullscreen-mode .brand-header {
        opacity: 0.2;
      } /* Fades out during full immersion */
      .logo-main {
        font-weight: 900;
        font-size: 32px;
        letter-spacing: -1px;
        color: var(--action-lead);
        line-height: 1;
      }
      .logo-sub {
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 4px;
        color: var(--text-neutral);
        text-transform: uppercase;
        background: var(--surface-primary);
        padding: 0 10px;
      }

      /* --- 📊 Performance Monitor --- */
      .perf-monitor {
        position: fixed;
        top: 25px;
        right: 25px;
        background: rgba(0, 0, 0, 0.75);
        color: #00ff00;
        font-family: "Courier New", monospace;
        font-size: 11px;
        font-weight: bold;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(0, 255, 0, 0.3);
        z-index: 150;
        backdrop-filter: blur(5px);
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: opacity 0.2s ease;
      }
      .perf-monitor span {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }

      /* --- 📽️ Main Spatial Layout --- */
      .app-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 40px 100px 40px;
        width: 100%;
        z-index: 10;
      }

      .preview-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1400px; /* Increased size to use more screen real estate */
        aspect-ratio: 16/9;
        border-radius: 24px;
        border: 8px solid var(--surface-white); /* Thick mirror frame */
        box-shadow:
          0 30px 60px rgba(138, 10, 10, 0.15),
          inset 0 0 0 1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        background: #000;
      }

      #preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #preview.flipped {
        transform: scaleX(-1);
      }
      #preview.flipped-v {
        transform: scaleY(-1);
      }
      #preview.flipped.flipped-v {
        transform: scaleX(-1) scaleY(-1);
      }

      /* --- 🎛️ In-Screen Overlays --- */
      .cam-ui {
        position: absolute;
        top: 30px;
        width: 100%;
        padding: 0 40px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-family: "VT323", monospace;
        font-size: 32px;
        color: rgba(255, 255, 255, 0.8);
        text-shadow: 2px 2px 0px #000;
        z-index: 10;
      }
      .rec-indicator {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ff3b30;
      }
      .rec-dot {
        width: 16px;
        height: 16px;
        background: #ff3b30;
        border-radius: 50%;
        box-shadow: 0 0 10px #ff3b30;
      }

      /* The 4-Cut Alignment Grid */
      .composition-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border: 1px dashed rgba(255, 255, 255, 0.4);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .composition-grid.visible {
        opacity: 1;
      }
      .composition-grid div {
        border: 1px dashed rgba(255, 255, 255, 0.4);
      }

      /* --- 🛠️ Toolbar --- */
      .toolbar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        border-radius: 100px;
        border: 1px solid rgba(138, 10, 10, 0.1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        z-index: 200;
        transition:
          transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.3s ease;
        flex-wrap: nowrap;
        white-space: nowrap;
      }
      .fullscreen-mode .toolbar {
        transform: translate(-50%, 150%);
        opacity: 0;
      }
      .fullscreen-mode .toolbar.show-toolbar {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      button,
      select {
        background: var(--action-lead);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      button:active:not(:disabled) {
        transform: scale(0.92);
        filter: brightness(0.8);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.active {
        background: white;
        color: var(--action-lead);
        box-shadow: 0 0 0 2px var(--action-lead);
      }

      /* --- Overlays --- */
      .full-overlay {
        position: fixed;
        inset: 0;
        background: var(--surface-primary);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .overlay-card {
        background: var(--surface-white);
        padding: 50px;
        border-radius: 20px;
        border: 1px solid var(--action-lead);
        text-align: center;
        width: 450px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
      }
      #licenseKey {
        width: 100%;
        padding: 15px;
        border-radius: 100px;
        border: 1px solid var(--action-lead);
        text-align: center;
        margin: 20px 0 10px 0;
        font-weight: bold;
        font-family: "Courier New", monospace;
        font-size: 16px;
        color: var(--action-lead);
      }
      .floating-heart {
        position: fixed;
        bottom: 20px;
        right: 30px;
        font-size: 50px;
        animation: float 4s ease-in-out infinite;
        opacity: 0.6;
        z-index: 10;
        pointer-events: none;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      .hidden {
        display: none !important;
      }
      .license-status {
        font-weight: 700;
        font-size: 12px;
        margin-top: 10px;
        display: block;
        color: #2d6a4f;
      }
      .trial-hint {
        font-size: 11px;
        color: var(--text-neutral);
        margin-top: 15px;
        display: block;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- Ambient Typography Background (Fills empty white space elegantly) -->
    <div class="ambient-text ambient-left">FILMONG</div>
    <div class="ambient-text ambient-right">STUDIO</div>

    <div class="brand-header">
      <div class="logo-main">FILMONG</div>
      <div class="logo-sub">LIVE MONITOR</div>
    </div>

    <!-- Live Performance Monitor -->
    <div class="perf-monitor hidden" id="perfMonitor">
      <span>RES: <b id="perfRes">0x0</b></span>
      <span>FPS: <b id="perfFps">0</b></span>
      <span>CAM: <b id="perfName">None</b></span>
    </div>

    <!-- 🔑 License Overlay -->
    <div id="licenseOverlay" class="full-overlay">
      <div class="overlay-card">
        <div class="logo-main" style="font-size: 24px; margin-bottom: 5px">
          FILMONG
        </div>
        <div class="logo-sub" style="margin-bottom: 20px">
          System Activation
        </div>
        <input
          type="text"
          id="licenseKey"
          placeholder="LIVE-XXXX-XXXX-XXXX"
          maxlength="23"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="activateBtn" onclick="handleActivate()" style="width: 100%">
          Activate System
        </button>
        <p
          id="licenseError"
          style="
            color: var(--action-lead);
            font-size: 12px;
            margin-top: 10px;
            min-height: 14px;
            font-weight: bold;
          "
        ></p>
        <small class="trial-hint">🎁 Trial Mode: 10 minutes without key</small>
        <small id="licenseStatus" class="license-status"></small>
      </div>
    </div>

    <!-- 📽️ Source Selector -->
    <div id="sourceSelector" class="full-overlay hidden">
      <div class="overlay-card">
        <div class="logo-sub" style="margin-bottom: 20px">Choose Source</div>
        <div style="display: flex; flex-direction: column; gap: 10px">
          <button onclick="startCamera()">📷 Camera (Capture Card)</button>
          <button onclick="startScreen()">🖥️ Share Screen</button>
        </div>
      </div>
    </div>

    <!-- 📸 Main Layout -->
    <div class="app-container">
      <div class="preview-wrapper">
        <div class="cam-ui">
          <div class="rec-indicator">
            <div class="rec-dot"></div>
            LIVE PREVIEW
          </div>
          <div id="liveClock">12:00 AM</div>
        </div>

        <!-- Alignment Grid for user posing -->
        <div class="composition-grid" id="gridOverlay">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>

        <video id="preview" autoplay playsinline muted></video>
      </div>
    </div>

    <div class="floating-heart">💖</div>

    <!-- 🛠️ Toolbar -->
    <div class="toolbar" id="toolbar">
      <button id="btnGrid" onclick="toggleGrid()">🔲 Khung Căn Chỉnh</button>
      <button id="btnPerf" onclick="togglePerf()">📊 Thông Số</button>
      <button id="btnFlipH" onclick="toggleFlipH()">↔️ Ngang</button>
      <button id="btnFlipV" onclick="toggleFlipV()">↕️ Dọc</button>
      <select
        id="cameraSelect"
        class="hidden"
        onchange="switchCamera()"
      ></select>
      <button onclick="changeSource()">🔄 Nguồn</button>
      <button onclick="toggleFullscreen()">⛶ Toàn Màn Hình</button>
    </div>

    <script>
      /* =======================================================
           1. UI FEATURES LOGIC
           ======================================================= */
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("liveClock").textContent =
          hours + ":" + minutes + " " + ampm;
      }
      setInterval(updateClock, 1000);
      updateClock();

      function toggleGrid() {
        document.getElementById("gridOverlay").classList.toggle("visible");
        document.getElementById("btnGrid").classList.toggle("active");
      }

      function togglePerf() {
        document.getElementById("perfMonitor").classList.toggle("hidden");
        document.getElementById("btnPerf").classList.toggle("active");
      }

      /* =======================================================
           2. PERFORMANCE MONITORING (Hardware Verification)
           ======================================================= */
      let perfInterval = null;
      function trackPerformance(track) {
        if (perfInterval) clearInterval(perfInterval);
        const perfRes = document.getElementById("perfRes");
        const perfFps = document.getElementById("perfFps");
        const perfName = document.getElementById("perfName");

        perfName.textContent =
          track.label.substring(0, 15) + (track.label.length > 15 ? "..." : "");

        perfInterval = setInterval(() => {
          const settings = track.getSettings();
          perfRes.textContent = `${settings.width || 0}x${settings.height || 0}`;
          perfFps.textContent = Math.round(settings.frameRate || 0);
        }, 1000);
      }

      /* =======================================================
           3. CORE CAMERA LOGIC (Capture Card Optimized)
           ======================================================= */
      const preview = document.getElementById("preview");
      const sourceSelector = document.getElementById("sourceSelector");
      const toolbar = document.getElementById("toolbar");
      const cameraSelect = document.getElementById("cameraSelect");

      let currentStream = null;
      let isFlippedH = false;
      let isFlippedV = false;

      function toggleFlipH() {
        isFlippedH = !isFlippedH;
        preview.classList.toggle("flipped", isFlippedH);
        document
          .getElementById("btnFlipH")
          .classList.toggle("active", isFlippedH);
      }

      function toggleFlipV() {
        isFlippedV = !isFlippedV;
        preview.classList.toggle("flipped-v", isFlippedV);
        document
          .getElementById("btnFlipV")
          .classList.toggle("active", isFlippedV);
      }

      function stopStream() {
        if (currentStream) {
          currentStream.getTracks().forEach((t) => t.stop());
          currentStream = null;
        }
        if (perfInterval) {
          clearInterval(perfInterval);
          perfInterval = null;
        }
        document.getElementById("perfRes").textContent = "0x0";
        document.getElementById("perfFps").textContent = "0";
      }

      // Specifically engineered for Fuji X-T2 / Ugreen capture cards to bypass browser compression
      const optimizedConstraints = {
        video: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 60 },
          noiseSuppression: false,
          autoGainControl: false,
          echoCancellation: false,
        },
        audio: false,
      };

      async function startCamera() {
        stopStream();
        try {
          const stream =
            await navigator.mediaDevices.getUserMedia(optimizedConstraints);
          currentStream = stream;
          preview.srcObject = stream;
          trackPerformance(stream.getVideoTracks()[0]);
          sourceSelector.classList.add("hidden");
          await loadCameras();
          cameraSelect.classList.remove("hidden");
        } catch (e) {
          alert("Camera Error: " + e.message);
        }
      }

      async function startScreen() {
        stopStream();
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });
          currentStream = stream;
          preview.srcObject = stream;
          trackPerformance(stream.getVideoTracks()[0]);
          sourceSelector.classList.add("hidden");
        } catch (e) {
          alert("Screen Error: " + e.message);
        }
      }

      async function loadCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter((d) => d.kind === "videoinput");
        cameraSelect.innerHTML = "";
        cameras.forEach((cam, i) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || `Cam ${i + 1}`;
          cameraSelect.appendChild(opt);
        });
      }

      async function switchCamera() {
        stopStream();
        const switchConstraints = {
          video: {
            deviceId: { exact: cameraSelect.value },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 60 },
            noiseSuppression: false,
            autoGainControl: false,
            echoCancellation: false,
          },
          audio: false,
        };
        try {
          const stream =
            await navigator.mediaDevices.getUserMedia(switchConstraints);
          currentStream = stream;
          preview.srcObject = stream;
          trackPerformance(stream.getVideoTracks()[0]);
        } catch (e) {
          alert("Switch Camera Error: " + e.message);
        }
      }

      function changeSource() {
        stopStream();
        sourceSelector.classList.remove("hidden");
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }

      // Fullscreen Logic
      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement)
          document.body.classList.add("fullscreen-mode");
        else {
          document.body.classList.remove("fullscreen-mode");
          toolbar.classList.remove("show-toolbar");
        }
      });
      document.addEventListener("mousemove", (e) => {
        if (!document.fullscreenElement) return;
        if (window.innerHeight - e.clientY < 100)
          toolbar.classList.add("show-toolbar");
        else toolbar.classList.remove("show-toolbar");
      });

      /* =======================================================
           4. SECURE API LICENSE LOGIC
           ======================================================= */
      const licenseOverlay = document.getElementById("licenseOverlay");
      const licenseKeyInput = document.getElementById("licenseKey");
      const licenseError = document.getElementById("licenseError");
      const licenseStatus = document.getElementById("licenseStatus");
      const activateBtn = document.getElementById("activateBtn");

      let licenseInfo = null;
      let trialExpiresAt = null;

      async function generateFingerprint() {
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 200;
          canvas.height = 50;
          ctx.fillStyle = "#f60";
          ctx.fillRect(0, 0, 200, 50);
          ctx.fillText("FP:" + navigator.userAgent, 2, 25);
          const data = [
            navigator.userAgent,
            navigator.language,
            screen.colorDepth,
            canvas.toDataURL(),
          ].join("|");
          const encoder = new TextEncoder();
          const buffer = await crypto.subtle.digest(
            "SHA-256",
            encoder.encode(data),
          );
          return Array.from(new Uint8Array(buffer))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("")
            .slice(0, 32);
        } catch (err) {
          return "unknown";
        }
      }

      async function handleActivate() {
        const key = licenseKeyInput.value.trim().toUpperCase();
        if (!key.match(/^LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}$/)) {
          licenseError.textContent = "Format required: LIVE-XXXX-XXXX-XXXX";
          return;
        }
        activateBtn.disabled = true;
        licenseError.textContent = "Activating...";
        try {
          const fingerprint = await generateFingerprint();
          const res = await fetch("/api/activate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              key,
              fingerprint,
              userAgent: navigator.userAgent,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            licenseError.textContent =
              data.message || data.error || "Activation failed";
            activateBtn.disabled = false;
            return;
          }
          licenseInfo = data;
          localStorage.setItem("license_key", key);
          localStorage.setItem("license_fingerprint", fingerprint);
          localStorage.setItem("license_expires", data.expires_at || "null");
          localStorage.setItem("license_activated", Date.now().toString());
          licenseOverlay.classList.add("hidden");
          sourceSelector.classList.remove("hidden");
          startLicenseHeartbeat();
        } catch (err) {
          licenseError.textContent = "Network error. Check connection.";
          activateBtn.disabled = false;
        }
      }

      async function validateLicense() {
        const key = localStorage.getItem("license_key");
        const fingerprint = localStorage.getItem("license_fingerprint");
        if (!key || !fingerprint) return false;
        try {
          const res = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, fingerprint }),
          });
          const data = await res.json();
          if (data.valid) {
            licenseInfo = data;
            localStorage.setItem("license_last_check", Date.now().toString());
            return true;
          }
        } catch (err) {
          return checkOfflineGrace();
        }
        return false;
      }

      function checkOfflineGrace() {
        const lastCheck = localStorage.getItem("license_last_check");
        return lastCheck ? Date.now() < parseInt(lastCheck) + 86400000 : false;
      }

      function updateLicenseStatus() {
        if (licenseInfo) licenseStatus.textContent = "✓ SYSTEM ACTIVATED";
        else if (trialExpiresAt) {
          const remaining = Math.ceil((trialExpiresAt - Date.now()) / 60000);
          if (remaining > 0)
            licenseStatus.textContent = `⏱ Trial mode: ${remaining}m remaining`;
          else
            licenseStatus.textContent = "⏱ Trial expired. Activation required.";
        }
      }

      function startTrialMode() {
        trialExpiresAt = Date.now() + 10 * 60 * 1000;
        licenseOverlay.classList.add("hidden");
        sourceSelector.classList.remove("hidden");
        updateLicenseStatus();
        setInterval(() => {
          updateLicenseStatus();
          if (Date.now() >= trialExpiresAt && !licenseInfo) {
            licenseOverlay.classList.remove("hidden");
            sourceSelector.classList.add("hidden");
            stopStream();
          }
        }, 60000);
      }

      function startLicenseHeartbeat() {
        setInterval(validateLicense, 300000);
        updateLicenseStatus();
      }

      const originalStartCamera = window.startCamera;
      window.startCamera = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartCamera();
      };

      const originalStartScreen = window.startScreen;
      window.startScreen = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartScreen();
      };

      async function initLicenseFlow() {
        const savedKey = localStorage.getItem("license_key");
        if (savedKey) {
          const valid = await validateLicense();
          if (valid) {
            licenseOverlay.classList.add("hidden");
            sourceSelector.classList.remove("hidden");
            startLicenseHeartbeat();
            return;
          } else {
            localStorage.removeItem("license_key");
            localStorage.removeItem("license_fingerprint");
          }
        }
      }
      if (document.readyState === "loading")
        document.addEventListener("DOMContentLoaded", initLicenseFlow);
      else initLicenseFlow();
    </script>
  </body>
</html>
