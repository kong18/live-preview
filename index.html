<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmong Photobooth Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --surface-primary: #f3d8e6; /* Pastel Pink */
        --action-lead: #8a0a0a; /* Filmong Red */
        --surface-white: #ffffff;
        --text-neutral: #1a1a1a;
        --safe-zone: 40px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: var(--surface-primary);
        color: var(--text-neutral);
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- ✨ Filmong Branding --- */
      .brand-header {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 100;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .fullscreen-mode .brand-header {
        opacity: 0.3;
      }
      .logo-main {
        font-weight: 900;
        font-size: 32px;
        letter-spacing: -1px;
        color: var(--action-lead);
        line-height: 1;
      }
      .logo-sub {
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 4px;
        color: var(--text-neutral);
        text-transform: uppercase;
      }

      /* --- 📽️ Preview Session Container --- */
      .app-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 90px 40px 100px 40px;
      }

      .preview-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1200px;
        border-radius: 24px;
        border: 6px solid var(--surface-white);
        box-shadow: 0 40px 80px rgba(138, 10, 10, 0.15);
        overflow: hidden;
        background: #000;
      }

      #preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #preview.flipped {
        transform: scaleX(-1);
      }
      #preview.flipped-v {
        transform: scaleY(-1);
      }
      #preview.flipped.flipped-v {
        transform: scaleX(-1) scaleY(-1);
      }

      /* --- 🎛️ In-Screen Overlays (Photobooth Feel) --- */
      .cam-ui {
        position: absolute;
        top: 30px;
        width: 100%;
        padding: 0 40px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-family: "VT323", monospace;
        font-size: 32px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 2px 2px 0px #000;
        z-index: 10;
      }
      .rec-indicator {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ff3b30;
      }
      .rec-dot {
        width: 16px;
        height: 16px;
        background: #ff3b30;
        border-radius: 50%;
        box-shadow: 0 0 10px #ff3b30;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .composition-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border: 1px dashed rgba(255, 255, 255, 0.4);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .composition-grid.visible {
        opacity: 1;
      }
      .composition-grid div {
        border: 1px dashed rgba(255, 255, 255, 0.4);
      }

      .pose-prompt {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface-white);
        color: var(--action-lead);
        padding: 12px 30px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 16px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        z-index: 10;
        pointer-events: none;
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, -10px);
        }
      }

      .flash-overlay {
        position: absolute;
        inset: 0;
        background: #fff;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
      }
      .flash-overlay.fire {
        animation: flashAnim 0.5s ease-out;
      }
      @keyframes flashAnim {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      /* --- 🛠️ Toolbar UX --- */
      .toolbar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(15px);
        border-radius: 100px;
        border: 1px solid var(--surface-white);
        z-index: 200;
        transition:
          transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.3s ease;
      }
      .fullscreen-mode .toolbar {
        transform: translate(-50%, 150%);
        opacity: 0;
      }
      .fullscreen-mode .toolbar.show-toolbar {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      button,
      select {
        background: var(--action-lead);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      button:active:not(:disabled) {
        transform: scale(0.92);
        filter: brightness(0.8);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.active {
        background: white;
        color: var(--action-lead);
        box-shadow: 0 0 0 2px var(--action-lead);
      }
      .btn-capture {
        background: #1a1a1a;
        color: #fff;
        border: 2px solid #fff;
      }

      /* --- Overlays --- */
      .full-overlay {
        position: fixed;
        inset: 0;
        background: var(--surface-primary);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .overlay-card {
        background: var(--surface-white);
        padding: 50px;
        border-radius: 20px;
        border: 1px solid var(--action-lead);
        text-align: center;
        width: 450px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
      }
      #licenseKey {
        width: 100%;
        padding: 15px;
        border-radius: 100px;
        border: 1px solid var(--action-lead);
        text-align: center;
        margin: 20px 0 10px 0;
        font-weight: bold;
        font-family: "Courier New", monospace;
        font-size: 16px;
        color: var(--action-lead);
      }
      .floating-heart {
        position: fixed;
        bottom: 20px;
        right: 30px;
        font-size: 50px;
        animation: float 4s ease-in-out infinite;
        opacity: 0.6;
        z-index: 10;
        pointer-events: none;
      }
      .hidden {
        display: none !important;
      }
      .license-status {
        font-weight: 700;
        font-size: 12px;
        margin-top: 10px;
        display: block;
        color: #2d6a4f;
      }
      .trial-hint {
        font-size: 11px;
        color: var(--text-neutral);
        margin-top: 15px;
        display: block;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="brand-header">
      <div class="logo-main">FILMONG</div>
      <div class="logo-sub">PHOTOBOOTH</div>
    </div>

    <div class="floating-heart">💖</div>

    <!-- 🔑 License / API Activation Overlay -->
    <div id="licenseOverlay" class="full-overlay">
      <div class="overlay-card">
        <div class="logo-main" style="font-size: 24px; margin-bottom: 5px">
          FILMONG
        </div>
        <div class="logo-sub" style="margin-bottom: 20px">
          System Activation
        </div>

        <input
          type="text"
          id="licenseKey"
          placeholder="LIVE-XXXX-XXXX-XXXX"
          maxlength="23"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="activateBtn" onclick="handleActivate()" style="width: 100%">
          Activate System
        </button>

        <p
          id="licenseError"
          style="
            color: var(--action-lead);
            font-size: 12px;
            margin-top: 10px;
            min-height: 14px;
            font-weight: bold;
          "
        ></p>
        <small class="trial-hint">🎁 Trial Mode: 10 minutes without key</small>
        <small id="licenseStatus" class="license-status"></small>
      </div>
    </div>

    <!-- 📽️ Source Selector -->
    <div id="sourceSelector" class="full-overlay hidden">
      <div class="overlay-card">
        <div class="logo-sub" style="margin-bottom: 20px">Choose Source</div>
        <div style="display: flex; flex-direction: column; gap: 10px">
          <button onclick="startCamera()">📷 Camera (Webcam)</button>
          <button onclick="startScreen()">🖥️ Share Screen</button>
        </div>
      </div>
    </div>

    <!-- 📸 Main Viewport -->
    <div class="app-container">
      <div class="preview-wrapper">
        <div class="cam-ui">
          <div class="rec-indicator">
            <div class="rec-dot"></div>
            REC
          </div>
          <div id="liveClock">12:00 AM</div>
        </div>
        <div class="composition-grid" id="gridOverlay">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="pose-prompt" id="posePrompt">
          📸 Ready? Show your best smile!
        </div>
        <video id="preview" autoplay playsinline muted></video>
        <div class="flash-overlay" id="flashOverlay"></div>
      </div>
    </div>

    <!-- 🛠️ Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="btn-capture" onclick="simulateCapture()">
        📸 CHỤP MẪU
      </button>
      <button id="btnGrid" onclick="toggleGrid()">🔲 Lưới 4 Ô</button>
      <button id="btnFlipH" onclick="toggleFlipH()">↔️ Ngang</button>
      <button id="btnFlipV" onclick="toggleFlipV()">↕️ Dọc</button>
      <select
        id="cameraSelect"
        class="hidden"
        onchange="switchCamera()"
      ></select>
      <button onclick="changeSource()">🔄 Đổi Nguồn</button>
      <button onclick="toggleFullscreen()">⛶ Màn Hình</button>
    </div>

    <script>
      /* =======================================================
           1. NEW UI FEATURES LOGIC (Clock, Grid, Capture)
           ======================================================= */
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("liveClock").textContent =
          hours + ":" + minutes + " " + ampm;
      }
      setInterval(updateClock, 1000);
      updateClock();

      function toggleGrid() {
        document.getElementById("gridOverlay").classList.toggle("visible");
        document.getElementById("btnGrid").classList.toggle("active");
      }

      function simulateCapture() {
        const flash = document.getElementById("flashOverlay");
        const prompt = document.getElementById("posePrompt");
        flash.classList.remove("fire");
        void flash.offsetWidth;
        flash.classList.add("fire");
        const prompts = [
          "✌️ Peace sign!",
          "🫶 Make a heart!",
          "😜 Winking face!",
          "💅 Slay!",
          "🐰 Bunny ears!",
        ];
        prompt.textContent =
          prompts[Math.floor(Math.random() * prompts.length)];
      }

      /* =======================================================
           2. CORE CAMERA LOGIC
           ======================================================= */
      const preview = document.getElementById("preview");
      const sourceSelector = document.getElementById("sourceSelector");
      const toolbar = document.getElementById("toolbar");
      const cameraSelect = document.getElementById("cameraSelect");

      let currentStream = null;
      let isFlippedH = false;
      let isFlippedV = false;

      function toggleFlipH() {
        isFlippedH = !isFlippedH;
        preview.classList.toggle("flipped", isFlippedH);
        document
          .getElementById("btnFlipH")
          .classList.toggle("active", isFlippedH);
      }

      function toggleFlipV() {
        isFlippedV = !isFlippedV;
        preview.classList.toggle("flipped-v", isFlippedV);
        document
          .getElementById("btnFlipV")
          .classList.toggle("active", isFlippedV);
      }

      function stopStream() {
        if (currentStream) {
          currentStream.getTracks().forEach((t) => t.stop());
          currentStream = null;
        }
      }

      async function startCamera() {
        stopStream();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 1920, height: 1080 },
          });
          currentStream = stream;
          preview.srcObject = stream;
          sourceSelector.classList.add("hidden");
          await loadCameras();
          cameraSelect.classList.remove("hidden");
        } catch (e) {
          alert("Camera Error: " + e.message);
        }
      }

      async function startScreen() {
        stopStream();
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });
          currentStream = stream;
          preview.srcObject = stream;
          sourceSelector.classList.add("hidden");
        } catch (e) {
          alert("Screen Error: " + e.message);
        }
      }

      async function loadCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter((d) => d.kind === "videoinput");
        cameraSelect.innerHTML = "";
        cameras.forEach((cam, i) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || `Cam ${i + 1}`;
          cameraSelect.appendChild(opt);
        });
      }

      async function switchCamera() {
        stopStream();
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: cameraSelect.value } },
        });
        currentStream = stream;
        preview.srcObject = stream;
      }

      function changeSource() {
        stopStream();
        sourceSelector.classList.remove("hidden");
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }

      // Fullscreen Smart Toolbar Hide
      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement)
          document.body.classList.add("fullscreen-mode");
        else {
          document.body.classList.remove("fullscreen-mode");
          toolbar.classList.remove("show-toolbar");
        }
      });
      document.addEventListener("mousemove", (e) => {
        if (!document.fullscreenElement) return;
        if (window.innerHeight - e.clientY < 100)
          toolbar.classList.add("show-toolbar");
        else toolbar.classList.remove("show-toolbar");
      });

      /* =======================================================
           3. RESTORED: FULL SECURE API LICENSE LOGIC
           ======================================================= */
      const licenseOverlay = document.getElementById("licenseOverlay");
      const licenseKeyInput = document.getElementById("licenseKey");
      const licenseError = document.getElementById("licenseError");
      const licenseStatus = document.getElementById("licenseStatus");
      const activateBtn = document.getElementById("activateBtn");

      let licenseInfo = null;
      let trialExpiresAt = null;

      // Crypto Fingerprinting
      async function generateFingerprint() {
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 200;
          canvas.height = 50;
          ctx.fillStyle = "#f60";
          ctx.fillRect(0, 0, 200, 50);
          ctx.fillText("FP:" + navigator.userAgent, 2, 25);
          const data = [
            navigator.userAgent,
            navigator.language,
            screen.colorDepth,
            canvas.toDataURL(),
          ].join("|");
          const encoder = new TextEncoder();
          const buffer = await crypto.subtle.digest(
            "SHA-256",
            encoder.encode(data),
          );
          return Array.from(new Uint8Array(buffer))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("")
            .slice(0, 32);
        } catch (err) {
          return "unknown";
        }
      }

      // Trigger API Activate
      async function handleActivate() {
        const key = licenseKeyInput.value.trim().toUpperCase();
        if (!key.match(/^LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}$/)) {
          licenseError.textContent = "Format required: LIVE-XXXX-XXXX-XXXX";
          return;
        }

        activateBtn.disabled = true;
        licenseError.textContent = "Activating...";

        try {
          const fingerprint = await generateFingerprint();
          const res = await fetch("/api/activate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              key,
              fingerprint,
              userAgent: navigator.userAgent,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            licenseError.textContent =
              data.message || data.error || "Activation failed";
            activateBtn.disabled = false;
            return;
          }

          // Success
          licenseInfo = data;
          localStorage.setItem("license_key", key);
          localStorage.setItem("license_fingerprint", fingerprint);
          localStorage.setItem("license_expires", data.expires_at || "null");
          localStorage.setItem("license_activated", Date.now().toString());

          licenseOverlay.classList.add("hidden");
          sourceSelector.classList.remove("hidden");
          startLicenseHeartbeat();
        } catch (err) {
          console.error(err);
          licenseError.textContent = "Network error. Check connection.";
          activateBtn.disabled = false;
        }
      }

      // Validate API (Heartbeat)
      async function validateLicense() {
        const key = localStorage.getItem("license_key");
        const fingerprint = localStorage.getItem("license_fingerprint");
        if (!key || !fingerprint) return false;

        try {
          const res = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, fingerprint }),
          });
          const data = await res.json();
          if (data.valid) {
            licenseInfo = data;
            localStorage.setItem("license_last_check", Date.now().toString());
            return true;
          }
        } catch (err) {
          return checkOfflineGrace();
        }
        return false;
      }

      function checkOfflineGrace() {
        const lastCheck = localStorage.getItem("license_last_check");
        return lastCheck ? Date.now() < parseInt(lastCheck) + 86400000 : false; // 24 hours
      }

      function updateLicenseStatus() {
        if (licenseInfo) {
          licenseStatus.textContent = "✓ SYSTEM ACTIVATED";
        } else if (trialExpiresAt) {
          const remaining = Math.ceil((trialExpiresAt - Date.now()) / 60000);
          if (remaining > 0) {
            licenseStatus.textContent = `⏱ Trial mode: ${remaining}m remaining`;
          } else {
            licenseStatus.textContent = "⏱ Trial expired. Activation required.";
          }
        }
      }

      function startTrialMode() {
        trialExpiresAt = Date.now() + 10 * 60 * 1000; // 10 minutes
        licenseOverlay.classList.add("hidden");
        sourceSelector.classList.remove("hidden");
        updateLicenseStatus();

        setInterval(() => {
          updateLicenseStatus();
          if (Date.now() >= trialExpiresAt && !licenseInfo) {
            licenseOverlay.classList.remove("hidden");
            sourceSelector.classList.add("hidden");
            stopStream(); // Force stop video
          }
        }, 60000);
      }

      function startLicenseHeartbeat() {
        setInterval(validateLicense, 5 * 60 * 1000);
        updateLicenseStatus();
      }

      // Intercept Source logic for Trial validation
      const originalStartCamera = window.startCamera;
      window.startCamera = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartCamera();
      };

      const originalStartScreen = window.startScreen;
      window.startScreen = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartScreen();
      };

      // Init App Flow
      async function initLicenseFlow() {
        const savedKey = localStorage.getItem("license_key");
        if (savedKey) {
          const valid = await validateLicense();
          if (valid) {
            licenseOverlay.classList.add("hidden");
            sourceSelector.classList.remove("hidden");
            startLicenseHeartbeat();
            return;
          } else {
            localStorage.removeItem("license_key");
            localStorage.removeItem("license_fingerprint");
          }
        }
        // Defaults to showing License Overlay (which is visible by default in HTML)
      }

      // Run Init
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initLicenseFlow);
      } else {
        initLicenseFlow();
      }
    </script>
  </body>
</html>
