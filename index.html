<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmong Live Preview Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --surface-primary: #f3d8e6;
        --action-lead: #8a0a0a;
        --action-glow: rgba(138, 10, 10, 0.4);
        --surface-white: #ffffff;
        --text-neutral: #1a1a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--surface-primary);
        background-image: radial-gradient(
          rgba(138, 10, 10, 0.08) 2px,
          transparent 2px
        );
        background-size: 30px 30px;
        color: var(--text-neutral);
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* --- 🌀 KINETIC TYPOGRAPHY --- */
      .ambient-container {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 12vw;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
        user-select: none;
      }
      .ambient-left {
        left: 0;
      }
      .ambient-right {
        right: 0;
      }

      .ambient-track {
        display: flex;
        flex-direction: column;
        gap: 20px;
        font-size: 15vw;
        font-weight: 900;
        color: rgba(138, 10, 10, 0.04);
        writing-mode: vertical-rl;
        text-orientation: mixed;
        height: 200vh;
      }

      .ambient-left .ambient-track {
        transform: rotate(180deg);
        animation: scrollMarquee 40s linear infinite;
      }
      .ambient-right .ambient-track {
        animation: scrollMarqueeRight 40s linear infinite;
      }

      @keyframes scrollMarquee {
        0% {
          transform: translateY(0) rotate(180deg);
        }
        100% {
          transform: translateY(50%) rotate(180deg);
        }
      }
      @keyframes scrollMarqueeRight {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50%);
        }
      }

      /* --- ✨ UPGRADED FILMONG BRANDING --- */
      .brand-header {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 10px 25px 10px 30px;
        border-radius: 100px;
        box-shadow:
          0 15px 35px rgba(138, 10, 10, 0.08),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        z-index: 100;
        pointer-events: none;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* 🔴 THE FIX: Completely hide the logo when in Fullscreen */
      .fullscreen-mode .brand-header {
        opacity: 0;
        transform: translate(-50%, -150%);
      }

      .logo-main {
        font-weight: 900;
        font-size: 28px;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #8a0a0a 0%, #e94560 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0px 2px 4px rgba(138, 10, 10, 0.2));
        line-height: 1;
      }

      .logo-sub {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--action-lead);
        text-transform: uppercase;
        background: rgba(138, 10, 10, 0.06);
        padding: 6px 14px;
        border-radius: 50px;
      }

      .brand-live-dot {
        width: 8px;
        height: 8px;
        background: #ff3b30;
        border-radius: 50%;
        box-shadow: 0 0 10px #ff3b30;
        animation: pulseBrand 1.5s infinite;
      }
      @keyframes pulseBrand {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* --- 📊 Performance Monitor --- */
      .perf-monitor {
        position: fixed;
        top: 25px;
        right: 25px;
        background: rgba(0, 0, 0, 0.75);
        color: #00ff00;
        font-family: "Courier New", monospace;
        font-size: 11px;
        font-weight: bold;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(0, 255, 0, 0.3);
        z-index: 150;
        backdrop-filter: blur(5px);
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .perf-monitor.hidden {
        opacity: 0;
        transform: translateY(-10px);
      }
      .perf-monitor span {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }

      /* --- 📽️ Main Spatial Layout & BREATHING GLOW --- */
      .app-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 40px 100px 40px;
        width: 100%;
        z-index: 10;
      }

      .preview-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1400px;
        aspect-ratio: 16/9;
        border-radius: 24px;
        border: 8px solid var(--surface-white);
        background: #000;
        overflow: hidden;
        animation: studioBreathing 4s ease-in-out infinite;
      }

      /* Expands fully in fullscreen */
      .fullscreen-mode .preview-wrapper {
        border: none;
        border-radius: 0;
        max-width: 100%;
        height: 100%;
        animation: none;
        box-shadow: none;
      }

      .fullscreen-mode .app-container {
        padding: 0;
      }

      @keyframes studioBreathing {
        0%,
        100% {
          box-shadow:
            0 20px 50px rgba(138, 10, 10, 0.1),
            inset 0 0 0 1px rgba(0, 0, 0, 0.2),
            0 0 0px var(--action-glow);
        }
        50% {
          box-shadow:
            0 30px 60px rgba(138, 10, 10, 0.2),
            inset 0 0 0 1px rgba(0, 0, 0, 0.2),
            0 0 40px var(--action-glow);
        }
      }

      #preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: transform;
        background: #000;
        filter: contrast(1.08) saturate(1.12) brightness(1.03);
        image-rendering: high-quality;
        backface-visibility: hidden;
      }
      #preview.flipped {
        transform: scaleX(-1);
      }
      #preview.flipped-v {
        transform: scaleY(-1);
      }
      #preview.flipped.flipped-v {
        transform: scaleX(-1) scaleY(-1);
      }

      /* Loading Indicator */
      .loading-indicator {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      .loading-indicator.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top: 3px solid #8a0a0a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        color: white;
        margin-top: 20px;
        font-size: 14px;
        font-family: "Montserrat", sans-serif;
      }

      /* --- 🎛️ In-Screen Overlays --- */
      .cam-ui {
        position: absolute;
        top: 30px;
        width: 100%;
        padding: 0 40px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-family: "VT323", monospace;
        font-size: 32px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 2px 2px 0px #000;
        z-index: 10;
      }
      .rec-indicator {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ff3b30;
      }
      .rec-dot {
        width: 16px;
        height: 16px;
        background: #ff3b30;
        border-radius: 50%;
        box-shadow: 0 0 15px #ff3b30;
        animation: blink 1.2s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }

      .composition-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        z-index: 5;
      }
      .composition-grid div {
        border: 1px dashed rgba(255, 255, 255, 0);
        transition: border-color 0.6s ease;
      }
      .composition-grid.visible div {
        border-color: rgba(255, 255, 255, 0.4);
      }

      /* --- 🛠️ Toolbar --- */
      .toolbar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        border-radius: 100px;
        border: 1px solid rgba(138, 10, 10, 0.1);
        box-shadow: 0 15px 35px rgba(138, 10, 10, 0.15);
        z-index: 200;
        transition:
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.4s ease;
        flex-wrap: nowrap;
        white-space: nowrap;
      }
      .fullscreen-mode .toolbar {
        transform: translate(-50%, 150%);
        opacity: 0;
      }
      .fullscreen-mode .toolbar.show-toolbar {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      button,
      select {
        position: relative;
        overflow: hidden;
        background: var(--action-lead);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }

      button::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.4) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-20deg);
        transition: 0.6s ease;
      }
      button:hover::after {
        left: 150%;
      }

      button:hover:not(:disabled) {
        box-shadow: 0 8px 20px rgba(138, 10, 10, 0.3);
        transform: translateY(-2px);
      }
      button:active:not(:disabled) {
        transform: translateY(1px) scale(0.95);
        filter: brightness(0.9);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.active {
        background: white;
        color: var(--action-lead);
        box-shadow: 0 0 0 2px var(--action-lead) inset;
      }

      /* --- Overlays --- */
      .full-overlay {
        position: fixed;
        inset: 0;
        background: rgba(243, 216, 230, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }
      .full-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .overlay-card {
        background: var(--surface-white);
        padding: 50px;
        border-radius: 24px;
        border: 1px solid rgba(138, 10, 10, 0.2);
        text-align: center;
        width: 450px;
        box-shadow: 0 40px 80px rgba(138, 10, 10, 0.2);
        animation: cardEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes cardEntrance {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      #licenseKey {
        width: 100%;
        padding: 15px;
        border-radius: 100px;
        border: 2px solid rgba(138, 10, 10, 0.3);
        text-align: center;
        margin: 20px 0 10px 0;
        font-weight: bold;
        font-family: "Courier New", monospace;
        font-size: 16px;
        color: var(--action-lead);
        transition: border-color 0.3s;
        outline: none;
      }
      #licenseKey:focus {
        border-color: var(--action-lead);
      }

      .floating-heart {
        position: fixed;
        bottom: 20px;
        right: 30px;
        font-size: 50px;
        animation: float 4s ease-in-out infinite;
        opacity: 0.6;
        z-index: 10;
        pointer-events: none;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(10deg);
        }
      }
      .license-status {
        font-weight: 700;
        font-size: 12px;
        margin-top: 10px;
        display: block;
        color: #2d6a4f;
      }
      .trial-hint {
        font-size: 11px;
        color: var(--text-neutral);
        margin-top: 15px;
        display: block;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- 🌀 Kinetic Typography Background -->
    <div class="ambient-container ambient-left">
      <div class="ambient-track">
        <span>FILMONG STUDIO FILMONG STUDIO FILMONG STUDIO</span>
      </div>
    </div>
    <div class="ambient-container ambient-right">
      <div class="ambient-track">
        <span>LIVE MONITOR LIVE MONITOR LIVE MONITOR</span>
      </div>
    </div>

    <!-- ✨ THE PREMIUM BRAND HEADER -->
    <div class="brand-header">
      <div class="logo-main">FILMONG</div>
      <div class="logo-sub">
        <div class="brand-live-dot"></div>
        LIVE MONITOR
      </div>
    </div>

    <!-- 📊 Performance Monitor -->
    <div class="perf-monitor hidden" id="perfMonitor">
      <span>RES: <b id="perfRes">0x0</b></span>
      <span>FPS: <b id="perfFps">0</b></span>
      <span>CAM: <b id="perfName">None</b></span>
    </div>

    <!-- 🔑 License Overlay -->
    <div id="licenseOverlay" class="full-overlay">
      <div class="overlay-card">
        <div class="logo-main" style="font-size: 24px; margin-bottom: 5px">
          FILMONG
        </div>
        <div
          class="logo-sub"
          style="margin-bottom: 20px; justify-content: center; background: none"
        >
          System Activation
        </div>
        <input
          type="text"
          id="licenseKey"
          placeholder="LIVE-XXXX-XXXX-XXXX"
          maxlength="23"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="activateBtn" onclick="handleActivate()" style="width: 100%">
          Activate System
        </button>
        <p
          id="licenseError"
          style="
            color: var(--action-lead);
            font-size: 12px;
            margin-top: 10px;
            min-height: 14px;
            font-weight: bold;
          "
        ></p>
        <small class="trial-hint">🎁 Trial Mode: 10 minutes without key</small>
        <small id="licenseStatus" class="license-status"></small>
      </div>
    </div>

    <!-- 📽️ Source Selector -->
    <div id="sourceSelector" class="full-overlay hidden">
      <div class="overlay-card">
        <div
          class="logo-sub"
          style="margin-bottom: 20px; justify-content: center; background: none"
        >
          Choose Source
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px">
          <button onclick="startCamera()">📷 Camera (Capture Card)</button>
          <button onclick="startScreen()">🖥️ Share Screen</button>
        </div>
      </div>
    </div>

    <!-- 📸 Main Layout -->
    <div class="app-container">
      <div class="preview-wrapper">
        <div class="cam-ui">
          <div class="rec-indicator">
            <div class="rec-dot"></div>
            LIVE PREVIEW
          </div>
          <div id="liveClock">12:00 AM</div>
        </div>

        <div class="composition-grid" id="gridOverlay">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>

        <div class="loading-indicator" id="loadingIndicator">
          <div class="spinner"></div>
          <div class="loading-text">Initializing camera...</div>
        </div>

        <video id="preview" autoplay playsinline muted></video>
      </div>
    </div>

    <div class="floating-heart">💖</div>

    <!-- 🛠️ Toolbar -->
    <div class="toolbar" id="toolbar">
      <button id="btnGrid" onclick="toggleGrid()">🔲 Khung Căn Chỉnh</button>
      <button id="btnPerf" onclick="togglePerf()">📊 Thông Số</button>
      <button id="btnFlipH" onclick="toggleFlipH()">↔️ Ngang</button>
      <button id="btnFlipV" onclick="toggleFlipV()">↕️ Dọc</button>
      <select
        id="cameraSelect"
        class="hidden"
        onchange="switchCamera()"
      ></select>
      <button onclick="changeSource()">🔄 Nguồn</button>
      <button onclick="toggleFullscreen()">⛶ Toàn Màn Hình</button>
    </div>

    <script>
      /* =======================================================
           1. UI FEATURES LOGIC
           ======================================================= */
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("liveClock").textContent =
          hours + ":" + minutes + " " + ampm;
      }
      setInterval(updateClock, 1000);
      updateClock();

      function toggleGrid() {
        document.getElementById("gridOverlay").classList.toggle("visible");
        document.getElementById("btnGrid").classList.toggle("active");
      }

      function togglePerf() {
        document.getElementById("perfMonitor").classList.toggle("hidden");
        document.getElementById("btnPerf").classList.toggle("active");
      }

      /* =======================================================
           2. PERFORMANCE MONITORING & TRACK INSPECTION
           ======================================================= */
      let perfInterval = null;
      let currentTrack = null;

      function trackPerformance(track) {
        currentTrack = track;
        if (perfInterval) clearInterval(perfInterval);
        const perfRes = document.getElementById("perfRes");
        const perfFps = document.getElementById("perfFps");
        const perfName = document.getElementById("perfName");

        perfName.textContent =
          track.label.substring(0, 15) + (track.label.length > 15 ? "..." : "");

        // Get initial capabilities and settings
        inspectTrackCapabilities(track);

        perfInterval = setInterval(() => {
          const settings = track.getSettings();
          perfRes.textContent = `${settings.width || 0}x${settings.height || 0}`;
          perfFps.textContent = Math.round(settings.frameRate || 0);
        }, 1000);
      }

      function inspectTrackCapabilities(track) {
        try {
          const capabilities = track.getCapabilities();
          const settings = track.getSettings();
          console.log("🎥 Camera Capabilities:", {
            width: capabilities.width,
            height: capabilities.height,
            frameRate: capabilities.frameRate,
            aspectRatio: capabilities.aspectRatio,
          });
          console.log("📊 Current Settings:", {
            width: settings.width,
            height: settings.height,
            frameRate: settings.frameRate,
            aspectRatio: settings.aspectRatio,
          });
        } catch (e) {
          console.warn("⚠️ Cannot inspect capabilities:", e.message);
        }
      }

      // Dynamic constraint adjustment
      async function applyOptimalConstraints(track) {
        try {
          const capabilities = track.getCapabilities();
          const adjustedConstraints = {
            width: {
              min: Math.min(capabilities.width?.min || 640, 640),
              ideal: Math.min(capabilities.width?.max || 1920, 1920),
              max: capabilities.width?.max || 4096,
            },
            height: {
              min: Math.min(capabilities.height?.min || 480, 480),
              ideal: Math.min(capabilities.height?.max || 1080, 1080),
              max: capabilities.height?.max || 2160,
            },
            frameRate: {
              ideal: Math.min(capabilities.frameRate?.max || 60, 60),
              max: capabilities.frameRate?.max || 120,
            },
            aspectRatio: { ideal: 16 / 9 },
          };
          await track.applyConstraints(adjustedConstraints);
          console.log("✅ Optimal constraints applied");
        } catch (e) {
          console.warn("⚠️ Cannot apply optimal constraints:", e.message);
        }
      }

      /* =======================================================
           3. ENHANCED CAMERA LOGIC WITH FALLBACK CONSTRAINTS
           ======================================================= */
      const preview = document.getElementById("preview");
      const loadingIndicator = document.getElementById("loadingIndicator");
      const sourceSelector = document.getElementById("sourceSelector");
      const toolbar = document.getElementById("toolbar");
      const cameraSelect = document.getElementById("cameraSelect");

      let currentStream = null;
      let isFlippedH = false;
      let isFlippedV = false;
      let availableCameras = [];

      function showLoading(visible = true) {
        if (visible) {
          loadingIndicator.classList.remove("hidden");
        } else {
          loadingIndicator.classList.add("hidden");
        }
      }

      // Constraint profiles with fallback levels
      const constraintProfiles = [
        {
          name: "4K High Quality",
          video: {
            width: { min: 1920, ideal: 3840, max: 4096 },
            height: { min: 1080, ideal: 2160, max: 2160 },
            frameRate: { ideal: 30, max: 60 },
            aspectRatio: { ideal: 16 / 9 },
          },
        },
        {
          name: "1080p Premium",
          video: {
            width: { min: 1280, ideal: 1920, max: 1920 },
            height: { min: 720, ideal: 1080, max: 1080 },
            frameRate: { ideal: 60, max: 60 },
            aspectRatio: { ideal: 16 / 9 },
          },
        },
        {
          name: "720p Standard",
          video: {
            width: { ideal: 1280, max: 1280 },
            height: { ideal: 720, max: 720 },
            frameRate: { ideal: 30, max: 60 },
            aspectRatio: { ideal: 16 / 9 },
          },
        },
        {
          name: "VGA Fallback",
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 },
            frameRate: { ideal: 30 },
            aspectRatio: { ideal: 4 / 3 },
          },
        },
      ];

      // Pre-enumerate available cameras
      async function loadCameras() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          availableCameras = devices.filter((d) => d.kind === "videoinput");
          cameraSelect.innerHTML = "";
          if (availableCameras.length === 0) {
            console.warn("⚠️ No cameras found");
            return;
          }
          availableCameras.forEach((cam, i) => {
            const opt = document.createElement("option");
            opt.value = cam.deviceId;
            opt.textContent = cam.label || `Camera ${i + 1}`;
            cameraSelect.appendChild(opt);
          });
          console.log(`✅ Found ${availableCameras.length} camera(s)`);
        } catch (e) {
          console.error("❌ Error enumerating devices:", e.message);
        }
      }

      // Check permission status
      async function checkPermission() {
        try {
          const result = await navigator.permissions.query({
            name: "camera",
          });
          console.log("📱 Camera permission status:", result.state);
          return result.state === "granted" || result.state === "prompt";
        } catch (e) {
          console.warn("⚠️ Cannot check permission:", e.message);
          return true; // Assume allowed
        }
      }

      // Start camera with intelligent fallback
      async function startCamera(deviceId = null) {
        stopStream();
        showLoading(true);

        if (!(await checkPermission())) {
          alert("Camera permission denied. Check browser settings.");
          showLoading(false);
          return;
        }

        await loadCameras();

        let selectedDeviceId = deviceId || availableCameras[0]?.deviceId;
        let stream = null;

        for (const profile of constraintProfiles) {
          try {
            const constraints = {
              audio: false,
              video: { ...profile.video },
            };

            if (selectedDeviceId) {
              constraints.video.deviceId = { exact: selectedDeviceId };
            }

            console.log(`🔄 Trying: ${profile.name}`);
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            console.log(`✅ Success with: ${profile.name}`);
            break;
          } catch (e) {
            console.warn(`⚠️ ${profile.name} failed:`, e.message);

            // Retry the same profile without hard device lock if exact deviceId fails.
            if (selectedDeviceId) {
              try {
                const relaxedConstraints = {
                  audio: false,
                  video: { ...profile.video },
                };
                console.log(`🔁 Retrying ${profile.name} without exact deviceId`);
                stream = await navigator.mediaDevices.getUserMedia(
                  relaxedConstraints,
                );
                console.log(`✅ Success with relaxed ${profile.name}`);
                break;
              } catch (retryError) {
                console.warn(
                  `⚠️ Relaxed ${profile.name} failed:`,
                  retryError.message,
                );
              }
            }
          }
        }

        if (!stream) {
          alert(
            "❌ Cannot access camera. Check permission and device availability."
          );
          showLoading(false);
          return;
        }

        currentStream = stream;
        preview.srcObject = stream;
        const videoTrack = stream.getVideoTracks()[0];

        // Monitor and optimize track
        trackPerformance(videoTrack);
        await applyOptimalConstraints(videoTrack);

        showLoading(false);
        document.getElementById("sourceSelector").classList.add("hidden");
        cameraSelect.classList.remove("hidden");

        // Monitor video element dimensions
        preview.onloadedmetadata = () => {
          console.log(
            `📹 Video loaded: ${preview.videoWidth}x${preview.videoHeight}`
          );
        };
      }

      async function startScreen() {
        stopStream();
        showLoading(true);

        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: {
              cursor: "always",
              displaySurface: "monitor",
            },
            audio: false,
          });
          currentStream = stream;
          preview.srcObject = stream;
          trackPerformance(stream.getVideoTracks()[0]);
          showLoading(false);
          document.getElementById("sourceSelector").classList.add("hidden");
        } catch (e) {
          console.error("❌ Screen Share Error:", e.message);
          alert("Screen share failed: " + e.message);
          showLoading(false);
        }
      }

      async function switchCamera() {
        if (!cameraSelect.value) return;
        await startCamera(cameraSelect.value);
      }

      function stopStream() {
        if (currentStream) {
          currentStream.getTracks().forEach((track) => {
            console.log(`⏹️ Stopping track: ${track.kind}`);
            track.stop();
          });
          currentStream = null;
        }
        if (perfInterval) {
          clearInterval(perfInterval);
          perfInterval = null;
        }
        document.getElementById("perfRes").textContent = "0x0";
        document.getElementById("perfFps").textContent = "0";
      }

      function toggleFlipH() {
        isFlippedH = !isFlippedH;
        preview.classList.toggle("flipped", isFlippedH);
        document
          .getElementById("btnFlipH")
          .classList.toggle("active", isFlippedH);
      }

      function toggleFlipV() {
        isFlippedV = !isFlippedV;
        preview.classList.toggle("flipped-v", isFlippedV);
        document
          .getElementById("btnFlipV")
          .classList.toggle("active", isFlippedV);
      }

      function changeSource() {
        stopStream();
        document.getElementById("sourceSelector").classList.remove("hidden");
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }

      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement)
          document.body.classList.add("fullscreen-mode");
        else {
          document.body.classList.remove("fullscreen-mode");
          toolbar.classList.remove("show-toolbar");
        }
      });
      document.addEventListener("mousemove", (e) => {
        if (!document.fullscreenElement) return;
        if (window.innerHeight - e.clientY < 100)
          toolbar.classList.add("show-toolbar");
        else toolbar.classList.remove("show-toolbar");
      });

      /* =======================================================
           4. SECURE API LICENSE LOGIC
           ======================================================= */
      const licenseOverlay = document.getElementById("licenseOverlay");
      const licenseKeyInput = document.getElementById("licenseKey");
      const licenseError = document.getElementById("licenseError");
      const licenseStatus = document.getElementById("licenseStatus");
      const activateBtn = document.getElementById("activateBtn");

      let licenseInfo = null;
      let trialExpiresAt = null;

      async function generateFingerprint() {
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 200;
          canvas.height = 50;
          ctx.fillStyle = "#f60";
          ctx.fillRect(0, 0, 200, 50);
          ctx.fillText("FP:" + navigator.userAgent, 2, 25);
          const data = [
            navigator.userAgent,
            navigator.language,
            screen.colorDepth,
            canvas.toDataURL(),
          ].join("|");
          const encoder = new TextEncoder();
          const buffer = await crypto.subtle.digest(
            "SHA-256",
            encoder.encode(data),
          );
          return Array.from(new Uint8Array(buffer))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("")
            .slice(0, 32);
        } catch (err) {
          return "unknown";
        }
      }

      async function handleActivate() {
        const key = licenseKeyInput.value.trim().toUpperCase();
        if (!key.match(/^LIVE-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}$/)) {
          licenseError.textContent = "Format required: LIVE-XXXX-XXXX-XXXX";
          return;
        }
        activateBtn.disabled = true;
        licenseError.textContent = "Activating...";
        try {
          const fingerprint = await generateFingerprint();
          const res = await fetch("/api/activate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              key,
              fingerprint,
              userAgent: navigator.userAgent,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            licenseError.textContent =
              data.message || data.error || "Activation failed";
            activateBtn.disabled = false;
            return;
          }
          licenseInfo = data;
          localStorage.setItem("license_key", key);
          localStorage.setItem("license_fingerprint", fingerprint);
          localStorage.setItem("license_expires", data.expires_at || "null");
          localStorage.setItem("license_activated", Date.now().toString());
          licenseOverlay.classList.add("hidden");
          document.getElementById("sourceSelector").classList.remove("hidden");
          startLicenseHeartbeat();
        } catch (err) {
          licenseError.textContent = "Network error. Check connection.";
          activateBtn.disabled = false;
        }
      }

      async function validateLicense() {
        const key = localStorage.getItem("license_key");
        const fingerprint = localStorage.getItem("license_fingerprint");
        if (!key || !fingerprint) return false;
        try {
          const res = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, fingerprint }),
          });
          const data = await res.json();
          if (data.valid) {
            licenseInfo = data;
            localStorage.setItem("license_last_check", Date.now().toString());
            return true;
          }
        } catch (err) {
          return checkOfflineGrace();
        }
        return false;
      }

      function checkOfflineGrace() {
        const lastCheck = localStorage.getItem("license_last_check");
        return lastCheck ? Date.now() < parseInt(lastCheck) + 86400000 : false;
      }

      function updateLicenseStatus() {
        if (licenseInfo) licenseStatus.textContent = "✓ SYSTEM ACTIVATED";
        else if (trialExpiresAt) {
          const remaining = Math.ceil((trialExpiresAt - Date.now()) / 60000);
          if (remaining > 0)
            licenseStatus.textContent = `⏱ Trial mode: ${remaining}m remaining`;
          else
            licenseStatus.textContent = "⏱ Trial expired. Activation required.";
        }
      }

      function startTrialMode() {
        trialExpiresAt = Date.now() + 10 * 60 * 1000;
        licenseOverlay.classList.add("hidden");
        document.getElementById("sourceSelector").classList.remove("hidden");
        updateLicenseStatus();
        setInterval(() => {
          updateLicenseStatus();
          if (Date.now() >= trialExpiresAt && !licenseInfo) {
            licenseOverlay.classList.remove("hidden");
            document.getElementById("sourceSelector").classList.add("hidden");
            stopStream();
          }
        }, 60000);
      }

      function startLicenseHeartbeat() {
        setInterval(validateLicense, 300000);
        updateLicenseStatus();
      }

      const originalStartCamera = window.startCamera;
      window.startCamera = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartCamera();
      };

      const originalStartScreen = window.startScreen;
      window.startScreen = async function () {
        if (!licenseInfo && !trialExpiresAt) startTrialMode();
        else if (
          trialExpiresAt &&
          Date.now() >= trialExpiresAt &&
          !licenseInfo
        ) {
          licenseOverlay.classList.remove("hidden");
          return;
        }
        return originalStartScreen();
      };

      async function initLicenseFlow() {
        const savedKey = localStorage.getItem("license_key");
        if (savedKey) {
          const valid = await validateLicense();
          if (valid) {
            licenseOverlay.classList.add("hidden");
            document
              .getElementById("sourceSelector")
              .classList.remove("hidden");
            startLicenseHeartbeat();
            return;
          } else {
            localStorage.removeItem("license_key");
            localStorage.removeItem("license_fingerprint");
          }
        }
      }
      if (document.readyState === "loading")
        document.addEventListener("DOMContentLoaded", initLicenseFlow);
      else initLicenseFlow();
    </script>
  </body>
</html>
